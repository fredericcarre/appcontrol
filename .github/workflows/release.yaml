name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io/fredericcarre

jobs:
  # ---------------------------------------------------------------------------
  # Build Rust binaries for each target (PostgreSQL - default)
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-amd64
            musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-arm64
            cross: true
            musl: true
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-14  # Apple Silicon runner
            suffix: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-amd64
            ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            suffix: windows-arm64
            ext: .exe


    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Setting workspace version to $VERSION"
          sed -i.bak 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          rm -f Cargo.toml.bak

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu musl-tools
          # For aarch64-musl, we need cross to handle the compilation
          cargo install cross --git https://github.com/cross-rs/cross
          echo "USE_CROSS=true" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - name: Build release binaries
        run: |
          # Build backend with PostgreSQL support (default for Docker/server deployments)
          if [ "${USE_CROSS:-}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin appcontrol-backend --features postgres
            cross build --release --target ${{ matrix.target }} --bin appcontrol-gateway --bin appcontrol-agent --bin appctl
          else
            cargo build --release --target ${{ matrix.target }} --bin appcontrol-backend --features postgres
            cargo build --release --target ${{ matrix.target }} --bin appcontrol-gateway --bin appcontrol-agent --bin appctl
          fi
          # Copy PostgreSQL backend for packaging
          mkdir -p target/${{ matrix.target }}/release/postgres
          cp target/${{ matrix.target }}/release/appcontrol-backend* target/${{ matrix.target }}/release/postgres/ 2>/dev/null || true

          # ============================================================================
          # SQLite Backend Build - CRITICAL: DO NOT MODIFY WITHOUT READING DOCS
          # ============================================================================
          # MUST build from crates/backend/ directory, NOT workspace root!
          #
          # Why? Cargo workspace feature unification causes e2e-tests' sqlx/postgres
          # dependency to contaminate the SQLite build when building from workspace root.
          # The resulting binary fails with "SQLite mode not supported when compiled
          # with 'postgres' feature".
          #
          # This bug took 6 releases to fix (v1.3.4 → v1.3.9). See docs/SQLITE_IMPLEMENTATION.md
          # for full explanation and verification steps.
          # ============================================================================
          export CARGO_TARGET_DIR=$PWD/target-sqlite
          cd crates/backend
          if [ "${USE_CROSS:-}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --no-default-features --features sqlite
          else
            cargo build --release --target ${{ matrix.target }} --no-default-features --features sqlite
          fi
          cd ../..
          unset CARGO_TARGET_DIR
          # Copy SQLite backend for packaging - fail if file doesn't exist
          mkdir -p target/${{ matrix.target }}/release/sqlite
          cp target-sqlite/${{ matrix.target }}/release/appcontrol-backend* target/${{ matrix.target }}/release/sqlite/
          echo "SQLite backend copied successfully"
        shell: bash

      - name: Package binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          # Package PostgreSQL backend (default)
          cp target/${{ matrix.target }}/release/postgres/appcontrol-backend dist/appcontrol-backend-${{ matrix.suffix }}
          chmod +x dist/appcontrol-backend-${{ matrix.suffix }}
          # Package SQLite backend (standalone)
          cp target/${{ matrix.target }}/release/sqlite/appcontrol-backend dist/appcontrol-backend-sqlite-${{ matrix.suffix }}
          chmod +x dist/appcontrol-backend-sqlite-${{ matrix.suffix }}
          # Package other binaries
          for bin in appcontrol-gateway appcontrol-agent appctl; do
            cp target/${{ matrix.target }}/release/$bin dist/${bin}-${{ matrix.suffix }}
            chmod +x dist/${bin}-${{ matrix.suffix }}
          done

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          # Package PostgreSQL backend (default)
          Copy-Item "target/${{ matrix.target }}/release/postgres/appcontrol-backend.exe" "dist/appcontrol-backend-${{ matrix.suffix }}.exe"
          # Package SQLite backend (standalone)
          Copy-Item "target/${{ matrix.target }}/release/sqlite/appcontrol-backend.exe" "dist/appcontrol-backend-sqlite-${{ matrix.suffix }}.exe"
          # Package other binaries
          foreach ($bin in @("appcontrol-gateway", "appcontrol-agent", "appctl")) {
            Copy-Item "target/${{ matrix.target }}/release/${bin}.exe" "dist/${bin}-${{ matrix.suffix }}.exe"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build and push Docker images to GHCR (uses pre-built binaries)
  # ---------------------------------------------------------------------------
  build-docker:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [build-binaries]  # wait for binaries to be built
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download Linux amd64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: binaries/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push to fredericcarre registry first
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend.release
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-backend:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-backend:latest
          build-args: |
            BINARY_PATH=binaries/appcontrol-backend-linux-amd64

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.gateway.release
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-gateway:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-gateway:latest
          build-args: |
            BINARY_PATH=binaries/appcontrol-gateway-linux-amd64

      - name: Build and push agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.agent.release
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-agent:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-agent:latest
          build-args: |
            BINARY_PATH=binaries/appcontrol-agent-linux-amd64

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-frontend:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push azure-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.azure-gateway.release
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-azure-gateway:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-azure-gateway:latest
          build-args: |
            GATEWAY_BINARY_PATH=binaries/appcontrol-gateway-linux-amd64
            AGENT_BINARY_PATH=binaries/appcontrol-agent-linux-amd64

      # NOTE: nginx is now using the standard nginx:1.27-alpine image
      # No custom build needed - config is mounted at runtime

      - name: Build and push init-certs
        uses: docker/build-push-action@v6
        with:
          context: docker/init-certs
          file: docker/init-certs/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-init-certs:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-init-certs:latest

      # Mirror images to corp registry (separate login to avoid token conflict)
      - name: Log in to corp GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: xcomponent
          password: ${{ secrets.CORP_GITHUB_TOKEN }}

      - name: Mirror images to xcomponent registry
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          IMAGES="appcontrol-backend appcontrol-gateway appcontrol-agent appcontrol-frontend appcontrol-azure-gateway appcontrol-init-certs"
          for img in $IMAGES; do
            echo "Mirroring $img..."
            docker pull ${{ env.REGISTRY }}/${img}:${VERSION} || true
            docker tag ${{ env.REGISTRY }}/${img}:${VERSION} ghcr.io/xcomponent/${img}:${VERSION}
            docker tag ${{ env.REGISTRY }}/${img}:${VERSION} ghcr.io/xcomponent/${img}:latest
            docker push ghcr.io/xcomponent/${img}:${VERSION}
            docker push ghcr.io/xcomponent/${img}:latest
          done

  # ---------------------------------------------------------------------------
  # Package Helm chart
  # ---------------------------------------------------------------------------
  helm-package:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: helm package helm/appcontrol --version ${{ steps.version.outputs.VERSION }} --app-version ${{ steps.version.outputs.VERSION }} --destination dist/

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build frontend static files for standalone deployment
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Package frontend as zip
        run: |
          cd frontend/dist
          zip -r ../../appcontrol-frontend.zip .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: appcontrol-frontend.zip
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Create GitHub Release with all assets
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker, helm-package, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: Download Helm chart
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: artifacts/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/

      - name: Package examples
        run: tar czf artifacts/examples.tar.gz examples/

      - name: Copy release compose file
        run: cp docker/docker-compose.release.yaml artifacts/docker-compose.release.yaml

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums-sha256.txt

      - name: Generate release notes
        id: notes
        run: |
          cat > /tmp/release-notes.md <<'NOTES_EOF'
          ## AppControl ${{ github.ref_name }}

          ### Installation

          **Docker Compose (recommended):**
          ```bash
          # Download compose file
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern 'docker-compose.release.yaml'

          # Start the full stack
          APPCONTROL_VERSION=${{ steps.version.outputs.VERSION }} docker compose -f docker-compose.release.yaml up -d
          ```

          **CLI binary:**
          ```bash
          # Linux (amd64)
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern 'appctl-linux-amd64' --dir /usr/local/bin
          chmod +x /usr/local/bin/appctl-linux-amd64 && mv /usr/local/bin/appctl-linux-amd64 /usr/local/bin/appctl

          # macOS (Apple Silicon)
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern 'appctl-darwin-arm64' --dir /usr/local/bin
          chmod +x /usr/local/bin/appctl-darwin-arm64 && mv /usr/local/bin/appctl-darwin-arm64 /usr/local/bin/appctl
          ```

          **Windows (PowerShell):**
          ```powershell
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern 'appctl-windows-amd64.exe' --dir $env:LOCALAPPDATA\appcontrol
          Rename-Item "$env:LOCALAPPDATA\appcontrol\appctl-windows-amd64.exe" "appctl.exe"
          # Add to PATH: [Environment]::SetEnvironmentVariable("PATH", "$env:PATH;$env:LOCALAPPDATA\appcontrol", "User")
          ```

          **Docker images:**
          ```bash
          docker pull ghcr.io/fredericcarre/appcontrol-backend:${{ steps.version.outputs.VERSION }}
          docker pull ghcr.io/fredericcarre/appcontrol-frontend:${{ steps.version.outputs.VERSION }}
          docker pull ghcr.io/fredericcarre/appcontrol-gateway:${{ steps.version.outputs.VERSION }}
          docker pull ghcr.io/fredericcarre/appcontrol-agent:${{ steps.version.outputs.VERSION }}
          # nginx uses standard nginx:1.27-alpine image (no custom build)
          docker pull ghcr.io/fredericcarre/appcontrol-init-certs:${{ steps.version.outputs.VERSION }}
          ```

          ### Assets

          | Asset | Description |
          |-------|-------------|
          | `appctl-{os}-{arch}[.exe]` | CLI binary (Linux, macOS, Windows) |
          | `appcontrol-agent-{os}-{arch}[.exe]` | Agent binary (run natively without Docker) |
          | `appcontrol-backend-{os}-{arch}[.exe]` | Backend API server binary |
          | `appcontrol-gateway-{os}-{arch}[.exe]` | Gateway binary |
          | `appcontrol-frontend.zip` | Frontend static files (extract to `frontend/` next to backend exe) |
          | `docker-compose.release.yaml` | Docker Compose for running from images |
          | `appcontrol-azure-gateway` | Combined gateway+agent Docker image with Azure CLI |
          | `examples.tar.gz` | Example application maps |
          | `appcontrol-*.tgz` | Helm chart |
          | `checksums-sha256.txt` | SHA-256 checksums for all assets |

          **Full changelog:** https://github.com/${{ github.repository }}/compare/.../${{ github.ref_name }}
          NOTES_EOF

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists — uploading assets"
            gh release upload "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --clobber \
              artifacts/*
          else
            echo "Creating release ${{ github.ref_name }}"
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "AppControl ${{ github.ref_name }}" \
              --notes-file /tmp/release-notes.md \
              --latest \
              artifacts/*
          fi

  # ---------------------------------------------------------------------------
  # Mirror release to xcomponent/appcontrol-release
  # ---------------------------------------------------------------------------
  mirror-release:
    name: Mirror to corp repo
    runs-on: ubuntu-latest
    needs: [github-release]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: Download Helm chart
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: artifacts/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/
        continue-on-error: true

      # Clone corp repo, push docs/scripts/examples directly
      - name: Push files to corp repo
        env:
          GH_TOKEN: ${{ secrets.CORP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/xcomponent/appcontrol-release.git corp-repo
          cd corp-repo

          git config user.name "AppControl CI"
          git config user.email "ci@xcomponent.com"

          # Clean existing content (except .git)
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # Copy corp README (pre-written with correct branding)
          cp ../corp/README.md .

          # Copy docs
          mkdir -p docs
          cp ../docs/*.md docs/ 2>/dev/null || true

          # Copy scripts
          mkdir -p scripts
          cp ../scripts/*.ps1 ../scripts/*.sh ../scripts/*.json ../scripts/*.md scripts/ 2>/dev/null || true

          # Copy examples
          mkdir -p examples
          cp ../examples/*.json ../examples/*.md examples/ 2>/dev/null || true

          # Copy docker compose files
          mkdir -p docker
          cp ../docker/docker-compose.release.yaml docker/
          cp ../docker/docker-compose.prod.yaml docker/ 2>/dev/null || true

          # Copy openshift/azure deploy files
          mkdir -p openshift azure
          cp ../openshift/*.yaml ../openshift/*.sh openshift/ 2>/dev/null || true
          cp ../azure/*.sh azure/ 2>/dev/null || true

          # Create LICENSE
          cat > LICENSE <<'LICENSE_EOF'
          Copyright (c) 2024-2026 XComponent SAS. All rights reserved.

          This software is provided as pre-compiled binaries for evaluation
          and production use. Redistribution, reverse engineering, and offering
          as a managed service are prohibited without a commercial license.

          Contact: support@xcomponent.com for licensing inquiries.
          LICENSE_EOF
          sed -i 's/^          //' LICENSE

          # ---- Substitutions (all files except README which is already correct) ----
          find . -path ./.git -prune -o -type f \( -name '*.md' -o -name '*.ps1' -o -name '*.sh' -o -name '*.json' -o -name '*.yaml' \) -print \
            | grep -v README.md \
            | xargs sed -i 's|fredericcarre/appcontrol|xcomponent/appcontrol-release|g' 2>/dev/null || true

          find . -path ./.git -prune -o -type f \( -name '*.md' -o -name '*.ps1' -o -name '*.sh' -o -name '*.json' -o -name '*.yaml' \) -print \
            | grep -v README.md \
            | xargs sed -i 's|ghcr\.io/fredericcarre|ghcr.io/xcomponent|g' 2>/dev/null || true

          # Commit and push
          git add -A
          git diff --staged --quiet && echo "No changes to push" || {
            git commit -m "Release ${{ github.ref_name }} — docs, scripts, examples"
            git push origin main
          }
          cd ..

      # Prepare release assets
      - name: Prepare corp release assets
        run: |
          mkdir -p corp-assets
          # Package docs + scripts + examples into a zip from the corp-repo
          cd corp-repo
          zip -r ../artifacts/appcontrol-docs-scripts.zip docs/ scripts/ examples/ docker/ openshift/ azure/ LICENSE README.md 2>/dev/null || true
          cd ..

          # Also copy compose files individually
          cp corp-repo/docker/docker-compose.release.yaml artifacts/docker-compose.release.yaml 2>/dev/null || true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums-sha256.txt

      - name: Generate corp release notes
        run: |
          cat > /tmp/corp-release-notes.md <<'NOTES_EOF'
          ## AppControl ${{ github.ref_name }}

          ### Quick Start

          **Docker Compose (recommended):**
          ```bash
          gh release download ${{ github.ref_name }} --repo xcomponent/appcontrol-release --pattern 'docker-compose.release.yaml'
          APPCONTROL_VERSION=${{ steps.version.outputs.VERSION }} docker compose -f docker-compose.release.yaml up -d
          ```

          **Windows Standalone (SQLite, no Docker):**
          ```powershell
          gh release download ${{ github.ref_name }} --repo xcomponent/appcontrol-release --pattern '*.exe' --dir appcontrol\bin
          gh release download ${{ github.ref_name }} --repo xcomponent/appcontrol-release --pattern 'appcontrol-docs-scripts.zip'
          Expand-Archive appcontrol-docs-scripts.zip -DestinationPath appcontrol
          cd appcontrol\scripts
          .\deploy-standalone.ps1
          .\setup-site.ps1 -SiteName "Production"
          ```

          **CLI binary:**
          ```bash
          gh release download ${{ github.ref_name }} --repo xcomponent/appcontrol-release --pattern 'appctl-linux-amd64' --dir /usr/local/bin
          chmod +x /usr/local/bin/appctl-linux-amd64 && mv /usr/local/bin/appctl-linux-amd64 /usr/local/bin/appctl
          ```

          See the [full documentation](https://github.com/xcomponent/appcontrol-release) for Docker images, deployment guides, and example maps.
          NOTES_EOF

      - name: Create corp release
        env:
          GH_TOKEN: ${{ secrets.CORP_GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo xcomponent/appcontrol-release > /dev/null 2>&1; then
            echo "Release exists — uploading assets"
            gh release upload "${{ github.ref_name }}" \
              --repo xcomponent/appcontrol-release \
              --clobber \
              artifacts/*
          else
            echo "Creating release ${{ github.ref_name }}"
            gh release create "${{ github.ref_name }}" \
              --repo xcomponent/appcontrol-release \
              --title "AppControl ${{ github.ref_name }}" \
              --notes-file /tmp/corp-release-notes.md \
              --latest \
              artifacts/*
          fi
