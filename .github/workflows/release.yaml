name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.11.0). Must exist on remote."
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io/fredericcarre
  # Resolve tag: from push event or manual workflow_dispatch input
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ---------------------------------------------------------------------------
  # Build Rust binaries for each target (PostgreSQL - default)
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-amd64
            musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-arm64
            cross: true
            musl: true
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-14  # Apple Silicon runner
            suffix: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-amd64
            ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            suffix: windows-arm64
            ext: .exe


    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${RELEASE_TAG#v}
          echo "Setting workspace version to $VERSION"
          sed -i.bak 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          rm -f Cargo.toml.bak

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu musl-tools
          # Install cross via binary (much faster than compiling from source)
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
          echo "USE_CROSS=true" >> $GITHUB_ENV

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-release
          shared-key: release

      - name: Build release binaries
        run: |
          if [ "${USE_CROSS}" = "true" ]; then BUILD_CMD=cross; else BUILD_CMD=cargo; fi
          # Build all workspace binaries + postgres backend in one pass
          $BUILD_CMD build --release --target ${{ matrix.target }} \
            --bin appcontrol-backend --bin appcontrol-gateway --bin appcontrol-agent --bin appctl \
            --features postgres
          # Copy PostgreSQL backend for packaging
          mkdir -p target/${{ matrix.target }}/release/postgres
          cp target/${{ matrix.target }}/release/appcontrol-backend* target/${{ matrix.target }}/release/postgres/ 2>/dev/null || true

          # ============================================================================
          # SQLite Backend Build - CRITICAL: DO NOT MODIFY WITHOUT READING DOCS
          # ============================================================================
          # MUST build from crates/backend/ directory, NOT workspace root!
          #
          # Why? Cargo workspace feature unification causes e2e-tests' sqlx/postgres
          # dependency to contaminate the SQLite build when building from workspace root.
          # The resulting binary fails with "SQLite mode not supported when compiled
          # with 'postgres' feature".
          #
          # This bug took 6 releases to fix (v1.3.4 → v1.3.9). See docs/SQLITE_IMPLEMENTATION.md
          # for full explanation and verification steps.
          # ============================================================================
          if [ "${USE_CROSS}" = "true" ]; then BUILD_CMD=cross; else BUILD_CMD=cargo; fi
          export CARGO_TARGET_DIR=$PWD/target-sqlite
          cd crates/backend
          $BUILD_CMD build --release --target ${{ matrix.target }} --no-default-features --features sqlite
          cd ../..
          unset CARGO_TARGET_DIR
          # Copy SQLite backend for packaging - fail if file doesn't exist
          mkdir -p target/${{ matrix.target }}/release/sqlite
          cp target-sqlite/${{ matrix.target }}/release/appcontrol-backend* target/${{ matrix.target }}/release/sqlite/
          echo "SQLite backend copied successfully"
        shell: bash

      - name: Package binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          # Package PostgreSQL backend (default)
          cp target/${{ matrix.target }}/release/postgres/appcontrol-backend dist/appcontrol-backend-${{ matrix.suffix }}
          chmod +x dist/appcontrol-backend-${{ matrix.suffix }}
          # Package SQLite backend (standalone)
          cp target/${{ matrix.target }}/release/sqlite/appcontrol-backend dist/appcontrol-backend-sqlite-${{ matrix.suffix }}
          chmod +x dist/appcontrol-backend-sqlite-${{ matrix.suffix }}
          # Package other binaries
          for bin in appcontrol-gateway appcontrol-agent appctl; do
            cp target/${{ matrix.target }}/release/$bin dist/${bin}-${{ matrix.suffix }}
            chmod +x dist/${bin}-${{ matrix.suffix }}
          done

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          # Package PostgreSQL backend (default)
          Copy-Item "target/${{ matrix.target }}/release/postgres/appcontrol-backend.exe" "dist/appcontrol-backend-${{ matrix.suffix }}.exe"
          # Package SQLite backend (standalone)
          Copy-Item "target/${{ matrix.target }}/release/sqlite/appcontrol-backend.exe" "dist/appcontrol-backend-sqlite-${{ matrix.suffix }}.exe"
          # Package other binaries
          foreach ($bin in @("appcontrol-gateway", "appcontrol-agent", "appctl")) {
            Copy-Item "target/${{ matrix.target }}/release/${bin}.exe" "dist/${bin}-${{ matrix.suffix }}.exe"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build and push Docker images to GHCR (uses pre-built binaries)
  # ---------------------------------------------------------------------------
  build-docker:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [build-binaries]  # wait for binaries to be built
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT

      - name: Download Linux amd64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: binaries/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push to fredericcarre registry first
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend.release
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-backend:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-backend:latest
          build-args: |
            BINARY_PATH=binaries/appcontrol-backend-linux-amd64

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.gateway.release
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-gateway:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-gateway:latest
          build-args: |
            BINARY_PATH=binaries/appcontrol-gateway-linux-amd64

      - name: Build and push agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.agent.release
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-agent:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-agent:latest
          build-args: |
            BINARY_PATH=binaries/appcontrol-agent-linux-amd64

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-frontend:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push azure-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.azure-gateway.release
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-azure-gateway:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-azure-gateway:latest
          build-args: |
            GATEWAY_BINARY_PATH=binaries/appcontrol-gateway-linux-amd64
            AGENT_BINARY_PATH=binaries/appcontrol-agent-linux-amd64

      # NOTE: nginx is now using the standard nginx:1.27-alpine image
      # No custom build needed - config is mounted at runtime

      - name: Build and push init-certs
        uses: docker/build-push-action@v6
        with:
          context: docker/init-certs
          file: docker/init-certs/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/appcontrol-init-certs:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/appcontrol-init-certs:latest

      # Mirror images to corp registry (separate login to avoid token conflict)
      - name: Log in to corp GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: xcomponent
          password: ${{ secrets.CORP_GITHUB_TOKEN }}

      - name: Mirror images to xcomponent registry
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          IMAGES="appcontrol-backend appcontrol-gateway appcontrol-agent appcontrol-frontend appcontrol-azure-gateway appcontrol-init-certs"
          for img in $IMAGES; do
            echo "Mirroring $img..."
            docker pull ${{ env.REGISTRY }}/${img}:${VERSION} || true
            docker tag ${{ env.REGISTRY }}/${img}:${VERSION} ghcr.io/xcomponent/${img}:${VERSION}
            docker tag ${{ env.REGISTRY }}/${img}:${VERSION} ghcr.io/xcomponent/${img}:latest
            docker push ghcr.io/xcomponent/${img}:${VERSION}
            docker push ghcr.io/xcomponent/${img}:latest
          done

  # ---------------------------------------------------------------------------
  # Package Helm chart
  # ---------------------------------------------------------------------------
  helm-package:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: helm package helm/appcontrol --version ${{ steps.version.outputs.VERSION }} --app-version ${{ steps.version.outputs.VERSION }} --destination dist/

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build frontend static files for standalone deployment
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Package frontend as zip
        run: |
          cd frontend/dist
          zip -r ../../appcontrol-frontend.zip .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: appcontrol-frontend.zip
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Create GitHub Release with all assets
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker, helm-package, build-frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: Download Helm chart
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: artifacts/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/

      - name: Package examples
        run: tar czf artifacts/examples.tar.gz examples/

      - name: Package demo scenarios
        run: tar czf artifacts/demo-rebuild.tar.gz demo-rebuild/

      - name: Copy release compose file and standalone script
        run: |
          cp docker/docker-compose.release.yaml artifacts/docker-compose.release.yaml
          cp scripts/appcontrol.ps1 artifacts/appcontrol.ps1

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums-sha256.txt

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${RELEASE_TAG}"

          # ── Find previous tag to compute changelog range ──
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1 || true)
          if [ -z "$PREV_TAG" ]; then
            # First release: use all commits
            RANGE="HEAD"
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/${TAG}"
          else
            RANGE="${PREV_TAG}..HEAD"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          fi

          # ── Generate changelog from conventional commits ──
          # Categories: feat, fix, perf, refactor, docs, ci, chore, test, build
          generate_section() {
            local prefix="$1" title="$2"
            local commits
            commits=$(git log "$RANGE" --pretty=format:"%s|%h" --no-merges | grep -iE "^${prefix}(\(.+\))?:" | sort || true)
            if [ -n "$commits" ]; then
              echo ""
              echo "### ${title}"
              echo ""
              echo "$commits" | while IFS='|' read -r msg hash; do
                # Strip prefix (e.g., "feat: xxx" -> "xxx", "feat(scope): xxx" -> "**scope:** xxx")
                clean=$(echo "$msg" | sed -E "s/^${prefix}\(([^)]+)\): /\*\*\1:\*\* /i; s/^${prefix}: //i")
                echo "- ${clean} (\`${hash}\`)"
              done
            fi
          }

          # ── Stats ──
          COMMIT_COUNT=$(git rev-list --count "$RANGE" --no-merges 2>/dev/null || echo "?")
          CONTRIB_COUNT=$(git log "$RANGE" --pretty=format:"%an" --no-merges | sort -u | wc -l || echo "?")
          FILES_CHANGED=$(git diff --stat "$RANGE" -- | tail -1 | grep -oE '[0-9]+ file' | grep -oE '[0-9]+' || echo "?")

          {
            echo "## AppControl ${TAG}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "> ${COMMIT_COUNT} commits, ${FILES_CHANGED} files changed since ${PREV_TAG}"
            else
              echo "> Initial release — ${COMMIT_COUNT} commits"
            fi
            echo ""

            echo "---"
            echo ""
            echo "## What's Changed"

            generate_section "feat"     "New Features"
            generate_section "fix"      "Bug Fixes"
            generate_section "perf"     "Performance"
            generate_section "refactor" "Refactoring"
            generate_section "docs"     "Documentation"
            generate_section "ci"       "CI / Build"
            generate_section "test"     "Tests"

            # Catch-all for non-conventional commits
            OTHER=$(git log "$RANGE" --pretty=format:"%s|%h" --no-merges \
              | grep -viE "^(feat|fix|perf|refactor|docs|ci|test|chore|build|style|revert)(\(.+\))?:" || true)
            if [ -n "$OTHER" ]; then
              echo ""
              echo "### Other Changes"
              echo ""
              echo "$OTHER" | while IFS='|' read -r msg hash; do
                echo "- ${msg} (\`${hash}\`)"
              done
            fi

            echo ""
            echo "**Full diff:** [${PREV_TAG:-initial}...${TAG}](${COMPARE_URL})"

            echo ""
            echo "---"
            echo ""
            echo "### Installation"
            echo ""
            echo "**Docker Compose (recommended):**"
            echo '```bash'
            echo "gh release download ${TAG} --repo ${{ github.repository }} --pattern 'docker-compose.release.yaml'"
            echo "APPCONTROL_VERSION=${VERSION} docker compose -f docker-compose.release.yaml up -d"
            echo '```'
            echo ""
            echo "**CLI binary:**"
            echo '```bash'
            echo "# Linux (amd64)"
            echo "gh release download ${TAG} --repo ${{ github.repository }} --pattern 'appctl-linux-amd64' --dir /usr/local/bin"
            echo "chmod +x /usr/local/bin/appctl-linux-amd64 && mv /usr/local/bin/appctl-linux-amd64 /usr/local/bin/appctl"
            echo ""
            echo "# macOS (Apple Silicon)"
            echo "gh release download ${TAG} --repo ${{ github.repository }} --pattern 'appctl-darwin-arm64' --dir /usr/local/bin"
            echo "chmod +x /usr/local/bin/appctl-darwin-arm64 && mv /usr/local/bin/appctl-darwin-arm64 /usr/local/bin/appctl"
            echo '```'
            echo ""
            echo "**Docker images:**"
            echo '```bash'
            echo "docker pull ghcr.io/fredericcarre/appcontrol-backend:${VERSION}"
            echo "docker pull ghcr.io/fredericcarre/appcontrol-frontend:${VERSION}"
            echo "docker pull ghcr.io/fredericcarre/appcontrol-gateway:${VERSION}"
            echo "docker pull ghcr.io/fredericcarre/appcontrol-agent:${VERSION}"
            echo "docker pull ghcr.io/fredericcarre/appcontrol-init-certs:${VERSION}"
            echo '```'
            echo ""
            echo "### Assets"
            echo ""
            echo "| Asset | Description |"
            echo "|-------|-------------|"
            echo "| appctl-{os}-{arch} | CLI binary (Linux, macOS, Windows) |"
            echo "| appcontrol-agent-{os}-{arch} | Agent binary |"
            echo "| appcontrol-backend-{os}-{arch} | Backend API server binary |"
            echo "| appcontrol-gateway-{os}-{arch} | Gateway binary |"
            echo "| appcontrol-frontend.zip | Frontend static files |"
            echo "| appcontrol.ps1 | Standalone deployment script |"
            echo "| docker-compose.release.yaml | Docker Compose config |"
            echo "| examples.tar.gz | Example application maps |"
            echo "| demo-rebuild.tar.gz | End-to-end rebuild & DR demo scenario (map + Windows/Linux scripts + README) |"
            echo "| checksums-sha256.txt | SHA-256 checksums for all assets |"
          } > /tmp/release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ env.RELEASE_TAG }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release ${{ env.RELEASE_TAG }} already exists — uploading assets"
            gh release upload "${{ env.RELEASE_TAG }}" \
              --repo "${{ github.repository }}" \
              --clobber \
              artifacts/*
          else
            echo "Creating release ${{ env.RELEASE_TAG }}"
            gh release create "${{ env.RELEASE_TAG }}" \
              --repo "${{ github.repository }}" \
              --title "AppControl ${{ env.RELEASE_TAG }}" \
              --notes-file /tmp/release-notes.md \
              --latest \
              artifacts/*
          fi

  # ---------------------------------------------------------------------------
  # Mirror release to xcomponent/appcontrol-release
  # ---------------------------------------------------------------------------
  mirror-release:
    name: Mirror to corp repo
    runs-on: ubuntu-latest
    needs: [github-release]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: Download Helm chart
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: artifacts/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/
        continue-on-error: true

      # Clone corp repo, push docs/scripts/examples directly
      - name: Push files to corp repo
        env:
          GH_TOKEN: ${{ secrets.CORP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/xcomponent/appcontrol-release.git corp-repo
          cd corp-repo

          git config user.name "AppControl CI"
          git config user.email "ci@xcomponent.com"

          # Clean existing content (except .git)
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # Copy corp README (pre-written with correct branding)
          cp ../corp/README.md .

          # Copy docs
          mkdir -p docs
          cp ../docs/*.md docs/ 2>/dev/null || true

          # Copy scripts
          mkdir -p scripts
          cp ../scripts/*.ps1 ../scripts/*.sh ../scripts/*.json ../scripts/*.md scripts/ 2>/dev/null || true

          # Also place appcontrol.ps1 at repo root for maximum visibility
          cp ../scripts/appcontrol.ps1 ./appcontrol.ps1

          # Copy examples (JSON maps + Windows scripts)
          mkdir -p examples
          cp ../examples/*.json ../examples/*.md ../examples/*.bat ../examples/*.ps1 examples/ 2>/dev/null || true

          # Copy docker compose files
          mkdir -p docker
          cp ../docker/docker-compose.release.yaml docker/
          cp ../docker/docker-compose.prod.yaml docker/ 2>/dev/null || true

          # Copy openshift/azure deploy files
          mkdir -p openshift azure
          cp ../openshift/*.yaml ../openshift/*.sh openshift/ 2>/dev/null || true
          cp ../azure/*.sh azure/ 2>/dev/null || true

          # Create LICENSE
          cat > LICENSE <<'LICENSE_EOF'
          Copyright (c) 2024-2026 XComponent SAS. All rights reserved.

          This software is provided as pre-compiled binaries for evaluation
          and production use. Redistribution, reverse engineering, and offering
          as a managed service are prohibited without a commercial license.

          Contact: support@xcomponent.com for licensing inquiries.
          LICENSE_EOF
          sed -i 's/^          //' LICENSE

          # ---- Substitutions (all files except README which is already correct) ----
          find . -path ./.git -prune -o -type f \( -name '*.md' -o -name '*.ps1' -o -name '*.sh' -o -name '*.json' -o -name '*.yaml' \) -print \
            | grep -v README.md \
            | xargs sed -i 's|fredericcarre/appcontrol|xcomponent/appcontrol-release|g' 2>/dev/null || true

          find . -path ./.git -prune -o -type f \( -name '*.md' -o -name '*.ps1' -o -name '*.sh' -o -name '*.json' -o -name '*.yaml' \) -print \
            | grep -v README.md \
            | xargs sed -i 's|ghcr\.io/fredericcarre|ghcr.io/xcomponent|g' 2>/dev/null || true

          # Commit and push
          git add -A
          git diff --staged --quiet && echo "No changes to push" || {
            git commit -m "Release ${{ env.RELEASE_TAG }} — docs, scripts, examples"
            git push origin main
          }
          cd ..

      # Prepare release assets
      - name: Prepare corp release assets
        run: |
          mkdir -p corp-assets
          # Package docs + scripts + examples into a zip from the corp-repo
          cd corp-repo
          zip -r ../artifacts/appcontrol-docs-scripts.zip docs/ scripts/ examples/ docker/ openshift/ azure/ LICENSE README.md 2>/dev/null || true
          cd ..

          # Also copy compose files and standalone script individually
          cp corp-repo/docker/docker-compose.release.yaml artifacts/docker-compose.release.yaml 2>/dev/null || true
          cp corp-repo/scripts/appcontrol.ps1 artifacts/appcontrol.ps1 2>/dev/null || true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums-sha256.txt

      - name: Generate corp release notes
        run: |
          cat > /tmp/corp-release-notes.md <<'NOTES_EOF'
          ## AppControl ${{ env.RELEASE_TAG }}

          ### Quick Start

          **Docker Compose (recommended):**
          ```bash
          gh release download ${{ env.RELEASE_TAG }} --repo xcomponent/appcontrol-release --pattern 'docker-compose.release.yaml'
          APPCONTROL_VERSION=${{ steps.version.outputs.VERSION }} docker compose -f docker-compose.release.yaml up -d
          ```

          **Windows/Linux Standalone (SQLite, no Docker):**
          ```powershell
          mkdir AppControl; cd AppControl
          # Download the unified script
          Invoke-WebRequest -Uri "https://github.com/xcomponent/appcontrol-release/releases/download/${{ env.RELEASE_TAG }}/appcontrol.ps1" -OutFile appcontrol.ps1
          .\appcontrol.ps1 install
          .\appcontrol.ps1 start
          .\appcontrol.ps1 add-site Production
          ```

          **CLI binary:**
          ```bash
          gh release download ${{ env.RELEASE_TAG }} --repo xcomponent/appcontrol-release --pattern 'appctl-linux-amd64' --dir /usr/local/bin
          chmod +x /usr/local/bin/appctl-linux-amd64 && mv /usr/local/bin/appctl-linux-amd64 /usr/local/bin/appctl
          ```

          See the [full documentation](https://github.com/xcomponent/appcontrol-release) for Docker images, deployment guides, and example maps.
          NOTES_EOF

      - name: Create corp release
        env:
          GH_TOKEN: ${{ secrets.CORP_GITHUB_TOKEN }}
        run: |
          if gh release view "${{ env.RELEASE_TAG }}" --repo xcomponent/appcontrol-release > /dev/null 2>&1; then
            echo "Release exists — uploading assets"
            gh release upload "${{ env.RELEASE_TAG }}" \
              --repo xcomponent/appcontrol-release \
              --clobber \
              artifacts/*
          else
            echo "Creating release ${{ env.RELEASE_TAG }}"
            gh release create "${{ env.RELEASE_TAG }}" \
              --repo xcomponent/appcontrol-release \
              --title "AppControl ${{ env.RELEASE_TAG }}" \
              --notes-file /tmp/corp-release-notes.md \
              --latest \
              artifacts/*
          fi
