name: Documentation site (mirror to corp repo)

# Builds the MkDocs Material site from docs/*.md plus the root README/security
# files and publishes it to the corp repo's gh-pages branch
# (xcomponent/appcontrol-release). Pages on the corp repo is configured to
# serve from that branch and is fronted by the custom domain docs.appcontrol.io
# (see docs/CNAME).
#
# Triggers:
#   - push to main when any source markdown, mkdocs config, generator script,
#     or screenshot changes
#   - manual dispatch (for re-deploys without a content change, e.g. after a
#     theme bump)
#   - workflow_run after the screenshot capture workflow finishes on main, so
#     freshly auto-committed screenshots immediately appear on the site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/docs/**"
      - "README.md"
      - "README.en.md"
      - "SECURITY_ARCHITECTURE.md"
      - "CHANGELOG.md"
      - "RELEASE.md"
      - ".github/workflows/docs-pages.yaml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Documentation Screenshots"]
    types: [completed]
    branches: [main]

# Cancel superseded runs on the same ref — saves CI minutes when a flurry of
# auto-commits ("update screenshots", "fix typo") lands in quick succession.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# Note: this workflow does NOT use the `pages: write` permission. The corp
# repo's Pages instance is the publish target; deployment happens by pushing
# to xcomponent/appcontrol-release@gh-pages using a PAT (secrets.CORP_GITHUB_TOKEN,
# same secret the release workflow already uses for the binary / docs mirror).
permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and mirror to corp gh-pages
    runs-on: ubuntu-latest
    # Skip the workflow_run trigger when the upstream screenshot workflow
    # failed — no point publishing on broken inputs.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so mkdocs-git-revision-date-localized can compute
          # "last updated" timestamps from git.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs and plugins
        run: pip install -r docs/requirements.txt

      - name: Install Rust toolchain (for OpenAPI export)
        # Same stable toolchain the rest of CI uses. The Swatinem cache below
        # keeps doc-only pushes from paying the full compile cost on every run.
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs-openapi
          cache-on-failure: true

      - name: Export OpenAPI spec from the backend binary
        # The backend's OpenAPI spec is derived from #[utoipa::path] handler
        # annotations rather than hand-maintained. `--export-openapi` runs
        # before any DB / network setup, so no Postgres is needed.
        # gen_api.py reads APPCONTROL_OPENAPI_JSON to locate the file.
        run: |
          cargo build --bin appcontrol-backend --features postgres
          ./target/debug/appcontrol-backend --export-openapi /tmp/openapi.json
          echo "APPCONTROL_OPENAPI_JSON=/tmp/openapi.json" >> "$GITHUB_ENV"
          python -c "import json; s=json.load(open('/tmp/openapi.json')); print(f\"OpenAPI: {len(s.get('paths', {}))} paths, {len(s.get('components', {}).get('schemas', {}))} schemas\")"

      - name: Stage root docs inside docs/
        # The single source of truth for SECURITY_ARCHITECTURE.md, CHANGELOG.md
        # and RELEASE.md lives at the repo root. MkDocs only ingests files
        # under docs_dir, so we copy them in at build time. Doing this in CI
        # (not via committed copies) avoids drift between the root and the
        # docs/ duplicates.
        run: |
          set -euo pipefail
          for f in SECURITY_ARCHITECTURE.md CHANGELOG.md RELEASE.md; do
            if [ -f "$f" ]; then
              cp "$f" "docs/$f"
              echo "Staged $f → docs/$f"
            fi
          done

      - name: Regenerate reference docs from code
        # Runs every gen_*.py in scripts/docs to refresh docs/reference/*.md
        # from the source-of-truth code (Rust enums, openapi.json, SQL
        # migrations, clap derives, metrics call sites). The build fails
        # loudly if any generator can't parse its source — better a noisy
        # CI failure than silently stale reference pages.
        run: python scripts/docs/regen.py

      - name: Embed screenshots in USER_GUIDE
        # Mirror the substitution used by docs-screenshots.yaml so the public
        # site never shows a raw <!-- SCREENSHOT:name --> marker. The
        # screenshot capture workflow normally commits these replacements
        # back into USER_GUIDE.md, but a docs-only push to main (e.g. fixing
        # a typo) would otherwise publish unresolved markers.
        run: |
          if [ -d docs/screenshots ] && [ -f docs/USER_GUIDE.md ]; then
            for img in docs/screenshots/*.png; do
              [ -e "$img" ] || continue
              name=$(basename "$img" .png)
              sed -i "s|<!-- SCREENSHOT:${name} -->|![${name}](screenshots/${name}.png)|g" docs/USER_GUIDE.md
            done
          fi

      - name: Build site
        # We do NOT pass --strict here — see mkdocs.yml for the reasoning.
        # The build still fails on Python errors, broken Markdown extensions,
        # or invalid theme config.
        run: mkdocs build --clean --verbose

      - name: Mirror site to xcomponent/appcontrol-release@gh-pages
        env:
          # Same PAT the release workflow uses to push binaries / docs / examples
          # into the corp repo. Required scopes: contents:write on
          # xcomponent/appcontrol-release.
          CORP_GITHUB_TOKEN: ${{ secrets.CORP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CORP_GITHUB_TOKEN:-}" ]; then
            echo "::error::CORP_GITHUB_TOKEN is not set — cannot push to the corp repo."
            echo "::error::Add the PAT under Settings → Secrets → Actions of fredericcarre/appcontrol."
            exit 1
          fi

          REMOTE="https://x-access-token:${CORP_GITHUB_TOKEN}@github.com/xcomponent/appcontrol-release.git"

          # Try to clone the existing gh-pages branch; if it doesn't exist yet
          # (first deploy), clone the default branch and create gh-pages as an
          # orphan branch.
          if git ls-remote --exit-code --heads "${REMOTE}" gh-pages > /dev/null; then
            git clone --branch gh-pages --single-branch --depth 1 "${REMOTE}" corp-pages
            cd corp-pages
            # Wipe everything except .git so we get an exact mirror of site/.
            find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          else
            echo "gh-pages branch does not exist on corp repo — creating it"
            git clone --depth 1 "${REMOTE}" corp-pages
            cd corp-pages
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            # Same guard as above in case any stray files remain on disk.
            find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          fi

          # Copy the freshly built site verbatim.
          cp -r ../site/. ./

          # GitHub Pages otherwise treats _* dirs (which Material uses for
          # internal assets) as Jekyll-special. .nojekyll disables that.
          touch .nojekyll

          # docs/CNAME → site/CNAME → corp gh-pages root. This is how the
          # custom domain docs.appcontrol.io gets registered with Pages.

          git config user.name "AppControl docs CI"
          git config user.email "ci@xcomponent.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No documentation changes vs. the corp gh-pages tip — skipping commit."
            exit 0
          fi

          git commit -m "docs: rebuild from fredericcarre/appcontrol@${GITHUB_SHA::8}

          Source commit: https://github.com/fredericcarre/appcontrol/commit/${GITHUB_SHA}
          Triggered by: ${GITHUB_EVENT_NAME}
          Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          # Retry the push a handful of times — concurrent docs pushes are
          # rare but possible (e.g. a docs-screenshots auto-commit firing the
          # workflow_run trigger while a manual push lands).
          for attempt in 1 2 3 4; do
            if git push origin gh-pages; then
              echo "Pushed to xcomponent/appcontrol-release@gh-pages on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt rejected — pulling rebase and retrying"
            git pull --rebase origin gh-pages || true
            sleep $((attempt * 2))
          done

          echo "::error::Failed to push to corp gh-pages after 4 attempts."
          exit 1

      - name: Upload built site as workflow artefact
        # Kept even though we don't use it for Pages — useful for downloading
        # the exact site contents for incident review or for a corp pipeline
        # that wants the tarball instead of the gh-pages branch.
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
          retention-days: 14
