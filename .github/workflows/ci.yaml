name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appcontrol_test
          POSTGRES_USER: appcontrol
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build (debug)
        run: cargo build --workspace

      - name: Build (release)
        run: cargo build --release --workspace

      - name: Unit tests
        run: cargo test --workspace --exclude appcontrol-e2e-tests --exclude appcontrol-e2e-real -- --nocapture 2>&1 | tee /tmp/unit-test-output.txt
        env:
          DATABASE_URL: postgres://appcontrol:test@localhost:5432/appcontrol_test

      - name: Upload unit test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-output
          path: /tmp/unit-test-output.txt
          retention-days: 5

  # ---------------------------------------------------------------------------
  # SQLite Build Verification — ensure dual-mode backend compiles correctly
  # ---------------------------------------------------------------------------
  # CRITICAL: This job must build from crates/backend/ directory, NOT workspace root!
  # See docs/SQLITE_IMPLEMENTATION.md for explanation of Cargo feature unification issue.
  # ---------------------------------------------------------------------------
  sqlite-build:
    name: SQLite Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target-sqlite/
          key: ${{ runner.os }}-cargo-sqlite-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-sqlite-

      # CRITICAL: Build from crate directory to avoid workspace feature unification!
      # Building from workspace root causes e2e-tests' sqlx/postgres to contaminate the build.
      - name: Build backend with SQLite feature (from crate directory)
        run: |
          export CARGO_TARGET_DIR=$PWD/target-sqlite
          cd crates/backend
          cargo build --release --no-default-features --features sqlite

      # Regression check: verify the binary doesn't contain the postgres error message
      # This catches the Cargo workspace feature unification bug that took 6 releases to fix.
      - name: Verify SQLite binary is clean (no postgres contamination)
        run: |
          POSTGRES_ERRORS=$(strings target-sqlite/release/appcontrol-backend | grep -c "sqlite mode not supported" || true)
          if [ "$POSTGRES_ERRORS" != "0" ]; then
            echo "::error::SQLite binary contains postgres error message ($POSTGRES_ERRORS occurrences)!"
            echo "::error::This indicates Cargo workspace feature unification contaminated the build."
            echo "::error::The SQLite build MUST be done from crates/backend/ directory, not workspace root."
            echo "::error::See docs/SQLITE_IMPLEMENTATION.md for details."
            exit 1
          fi
          echo "✓ SQLite binary is clean (no postgres contamination)"

      - name: Run unit tests with SQLite feature
        run: |
          export CARGO_TARGET_DIR=$PWD/target-sqlite
          cd crates/backend
          cargo test --no-default-features --features sqlite -- --nocapture

      - name: Test SQLite backend startup
        run: |
          # Start the backend with SQLite in the background
          # Note: DATABASE_TYPE is not needed - the binary knows its database type at compile time
          mkdir -p /tmp/appcontrol
          DATABASE_URL=sqlite:/tmp/appcontrol/test.db \
          JWT_SECRET=test-secret \
          LOCAL_AUTH_ENABLED=true \
          SEED_ENABLED=true \
          SEED_ADMIN_EMAIL=admin@test.local \
          SEED_ADMIN_PASSWORD=admin \
          SEED_ORG_NAME=TestOrg \
          SEED_ORG_SLUG=test \
          timeout 30 ./target-sqlite/release/appcontrol-backend &
          BACKEND_PID=$!

          # Wait for backend to start
          sleep 5

          # Check if backend is healthy
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend healthy after $((i))s"
              kill $BACKEND_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          echo "Backend failed to start within 20s"
          kill $BACKEND_PID 2>/dev/null || true
          exit 1

  # ---------------------------------------------------------------------------
  # SQLite E2E Tests — same tests as PostgreSQL, compiled with SQLite feature
  # ---------------------------------------------------------------------------
  sqlite-e2e:
    name: SQLite E2E Tests
    runs-on: ubuntu-latest
    needs: [sqlite-build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target-sqlite-e2e/
          key: ${{ runner.os }}-cargo-sqlite-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-sqlite-e2e-

      # CRITICAL: Build e2e-tests from its own directory to avoid workspace
      # feature unification that would pull in sqlx/postgres.
      - name: Run SQLite E2E tests
        run: |
          export CARGO_TARGET_DIR=$PWD/target-sqlite-e2e
          cd crates/e2e-tests
          cargo test --no-default-features --features sqlite -- --test-threads=1 --nocapture 2>&1 | tee /tmp/sqlite-e2e-output.txt
        env:
          RUST_LOG: info

      - name: Upload SQLite E2E test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-e2e-test-output
          path: /tmp/sqlite-e2e-output.txt
          retention-days: 5

  # ---------------------------------------------------------------------------
  # SQLite Full Stack Smoke Test — backend + gateway startup verification
  # ---------------------------------------------------------------------------
  sqlite-smoke:
    name: SQLite Smoke Test
    runs-on: ubuntu-latest
    needs: [sqlite-build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target-sqlite/
          key: ${{ runner.os }}-cargo-sqlite-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-sqlite-

      - name: Build SQLite backend
        run: |
          export CARGO_TARGET_DIR=$PWD/target-sqlite
          cd crates/backend
          cargo build --release --no-default-features --features sqlite

      - name: Build gateway and agent
        run: cargo build --release -p appcontrol-gateway -p appcontrol-agent

      - name: Start SQLite backend and test API
        run: |
          mkdir -p /tmp/appcontrol/{data,logs}

          # Start backend
          DATABASE_URL=sqlite:/tmp/appcontrol/data/appcontrol.db \
          JWT_SECRET=e2e-test-secret-for-sqlite-ci-pipeline \
          LOCAL_AUTH_ENABLED=true \
          SEED_ENABLED=true \
          SEED_ADMIN_EMAIL=admin@test.local \
          SEED_ADMIN_PASSWORD=testpassword123 \
          SEED_ORG_NAME=TestOrg \
          SEED_ORG_SLUG=test \
          RUST_LOG=info \
          ./target-sqlite/release/appcontrol-backend > /tmp/appcontrol/logs/backend.log 2>&1 &
          BACKEND_PID=$!

          # Wait for backend
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Backend failed to start"
              cat /tmp/appcontrol/logs/backend.log
              kill $BACKEND_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Login
          TOKEN=$(curl -s -X POST http://localhost:3000/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@test.local","password":"testpassword123"}' | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Login failed"
            cat /tmp/appcontrol/logs/backend.log | tail -30
            kill $BACKEND_PID 2>/dev/null || true
            exit 1
          fi
          echo "Login OK"

          # Test core API endpoints
          FAILED=0
          for endpoint in apps sites agents gateways teams; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer $TOKEN" \
              http://localhost:3000/api/v1/$endpoint)
            if [ "$CODE" = "200" ]; then
              echo "  GET /api/v1/$endpoint → $CODE OK"
            else
              echo "  GET /api/v1/$endpoint → $CODE FAIL"
              FAILED=1
            fi
          done

          # Test CRUD: create app, create component, list
          APP_ID=$(curl -s -X POST http://localhost:3000/api/v1/apps \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"CI-Test-App","description":"CI test"}' | jq -r '.id')
          if [ -z "$APP_ID" ] || [ "$APP_ID" = "null" ]; then
            echo "  Create app FAIL"
            FAILED=1
          else
            echo "  Create app OK (id: ${APP_ID:0:8}...)"

            # Create component
            COMP_ID=$(curl -s -X POST http://localhost:3000/api/v1/apps/$APP_ID/components \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"test-svc","component_type":"service","check_cmd":"echo ok"}' | jq -r '.id')
            if [ -z "$COMP_ID" ] || [ "$COMP_ID" = "null" ]; then
              echo "  Create component FAIL"
              FAILED=1
            else
              echo "  Create component OK (id: ${COMP_ID:0:8}...)"
            fi

            # Delete app
            DEL_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE \
              -H "Authorization: Bearer $TOKEN" \
              http://localhost:3000/api/v1/apps/$APP_ID)
            echo "  Delete app → $DEL_CODE"
          fi

          # Check for errors in backend logs
          ERROR_COUNT=$(grep -c "ERROR" /tmp/appcontrol/logs/backend.log 2>/dev/null || echo "0")
          if [ "$ERROR_COUNT" -gt "0" ]; then
            echo "  WARNING: $ERROR_COUNT ERROR lines in backend log"
            grep "ERROR" /tmp/appcontrol/logs/backend.log | head -5
          fi

          kill $BACKEND_PID 2>/dev/null || true

          if [ "$FAILED" = "1" ]; then
            echo "Some tests failed"
            exit 1
          fi
          echo "All SQLite smoke tests passed!"

      - name: Collect logs on failure
        if: failure()
        run: cat /tmp/appcontrol/logs/backend.log | tail -50 || true

  # ---------------------------------------------------------------------------
  # Full-Stack E2E — backend + gateway + agent + real process start/stop
  # ---------------------------------------------------------------------------
  full-stack-e2e:
    name: Full-Stack E2E (SQLite)
    runs-on: ubuntu-latest
    needs: [sqlite-build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            target-sqlite/
          key: ${{ runner.os }}-cargo-fullstack-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-fullstack-

      - name: Build SQLite backend
        run: |
          export CARGO_TARGET_DIR=$PWD/target-sqlite
          cd crates/backend
          cargo build --release --no-default-features --features sqlite

      - name: Build gateway and agent
        run: cargo build --release -p appcontrol-gateway -p appcontrol-agent

      - name: Run full-stack E2E test
        run: |
          BACKEND_BIN=./target-sqlite/release/appcontrol-backend \
          GATEWAY_BIN=./target/release/appcontrol-gateway \
          AGENT_BIN=./target/release/appcontrol-agent \
          bash tests/full-stack-e2e.sh

  # ---------------------------------------------------------------------------
  # E2E Integration Tests — in-process backend + real PostgreSQL
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [rust-check]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: appcontrol
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run E2E tests
        continue-on-error: false
        run: cargo test -p appcontrol-e2e-tests -- --test-threads=1 --nocapture 2>&1 | tee /tmp/e2e-output.txt
        env:
          DATABASE_URL: postgres://appcontrol:test@localhost:5432/postgres
          TEST_DATABASE_ADMIN_URL: postgres://appcontrol:test@localhost:5432/postgres

      - name: Upload E2E test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-output
          path: /tmp/e2e-output.txt
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Docker Compose Smoke Test — build images, start full stack, verify endpoints
  # ---------------------------------------------------------------------------
  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [rust-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose -f docker/docker-compose.yaml build

      - name: Start the stack
        run: |
          set -x
          docker compose -f docker/docker-compose.yaml up -d 2>&1 || true
          echo "--- container status after up ---"
          docker compose -f docker/docker-compose.yaml ps -a
          echo "--- waiting for init-certs to complete ---"
          for i in $(seq 1 60); do
            # Use docker inspect for reliable exit code check (-a for exited containers)
            INIT_CONTAINER=$(docker compose -f docker/docker-compose.yaml ps -a -q init-certs 2>/dev/null || echo "")
            if [ -n "$INIT_CONTAINER" ]; then
              RUNNING=$(docker inspect -f '{{.State.Running}}' "$INIT_CONTAINER" 2>/dev/null || echo "true")
              if [ "$RUNNING" = "false" ]; then
                EXIT_CODE=$(docker inspect -f '{{.State.ExitCode}}' "$INIT_CONTAINER" 2>/dev/null || echo "1")
                if [ "$EXIT_CODE" = "0" ]; then
                  echo "init-certs completed successfully after $((i * 2))s"
                  break
                else
                  echo "init-certs failed with exit code $EXIT_CODE"
                  docker compose -f docker/docker-compose.yaml logs init-certs
                  exit 1
                fi
              fi
            fi
            if [ "$i" = "60" ]; then
              echo "init-certs did not complete within 120s"
              docker compose -f docker/docker-compose.yaml logs init-certs
              exit 1
            fi
            sleep 2
          done
          echo "--- waiting for backend health ---"
          for i in $(seq 1 90); do
            # Use docker compose exec to check health inside the network
            if docker compose -f docker/docker-compose.yaml exec -T backend curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend healthy after $((i * 2))s"
              break
            fi
            # Check if backend container is still running
            BACKEND_CONTAINER=$(docker compose -f docker/docker-compose.yaml ps -a -q backend 2>/dev/null || echo "")
            if [ -n "$BACKEND_CONTAINER" ]; then
              RUNNING=$(docker inspect -f '{{.State.Running}}' "$BACKEND_CONTAINER" 2>/dev/null || echo "true")
              if [ "$RUNNING" = "false" ]; then
                echo "Backend container exited — dumping logs:"
                docker compose -f docker/docker-compose.yaml logs backend
                exit 1
              fi
            fi
            if [ "$i" = "90" ]; then
              echo "Backend failed to start within 180s"
              docker compose -f docker/docker-compose.yaml ps -a
              docker compose -f docker/docker-compose.yaml logs backend
              exit 1
            fi
            sleep 2
          done
          echo "--- waiting for nginx ---"
          for i in $(seq 1 30); do
            if curl -sf -k https://localhost/health > /dev/null 2>&1; then
              echo "Nginx healthy after $((i * 2))s"
              break
            fi
            # Use -a flag to find exited containers
            NGINX_CONTAINER=$(docker compose -f docker/docker-compose.yaml ps -a -q nginx 2>/dev/null || echo "")
            if [ -n "$NGINX_CONTAINER" ]; then
              RUNNING=$(docker inspect -f '{{.State.Running}}' "$NGINX_CONTAINER" 2>/dev/null || echo "true")
              if [ "$RUNNING" = "false" ]; then
                echo "Nginx container exited — dumping logs:"
                docker compose -f docker/docker-compose.yaml logs nginx
                exit 1
              fi
            fi
            if [ "$i" = "30" ]; then
              echo "Nginx failed to start within 60s"
              docker compose -f docker/docker-compose.yaml logs nginx
              exit 1
            fi
            sleep 2
          done

      - name: Verify health endpoint (direct backend)
        run: |
          # Backend is not exposed to host, use docker exec
          BODY=$(docker compose -f docker/docker-compose.yaml exec -T backend curl -sf http://localhost:3000/health)
          echo "GET http://backend:3000/health → $BODY"
          echo "$BODY" | grep -q '"status":"ok"'

      - name: Verify HTTPS health endpoint (via nginx)
        run: |
          BODY=$(curl -sf -k https://localhost/health)
          echo "GET https://localhost/health → $BODY"
          echo "$BODY" | grep -q '"status":"ok"'

      - name: Verify HTTP to HTTPS redirect
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/)
          echo "GET http://localhost/ → $STATUS (expecting 301)"
          [ "$STATUS" = "301" ]

      - name: Verify TLS certificate
        run: |
          # Extract certificate subject
          CERT_SUBJECT=$(echo | openssl s_client -connect localhost:443 2>/dev/null | openssl x509 -noout -subject 2>/dev/null || true)
          echo "TLS certificate subject: $CERT_SUBJECT"
          # Verify certificate is valid (not expired)
          echo | openssl s_client -connect localhost:443 2>/dev/null | openssl x509 -noout -checkend 0 && echo "Certificate is valid"

      - name: Verify ready endpoint
        run: |
          # Backend not exposed to host, use docker exec
          STATUS=$(docker compose -f docker/docker-compose.yaml exec -T backend curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/ready)
          echo "GET /ready → $STATUS"
          [ "$STATUS" = "200" ]

      - name: Verify HTTPS API endpoint (via nginx)
        run: |
          STATUS=$(curl -s -k -o /dev/null -w '%{http_code}' https://localhost/api/v1/apps)
          echo "GET https://localhost/api/v1/apps (no auth) → $STATUS"
          [ "$STATUS" = "401" ]

      - name: Verify API requires auth
        run: |
          # Backend not exposed to host, use docker exec
          STATUS=$(docker compose -f docker/docker-compose.yaml exec -T backend curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/v1/apps)
          echo "GET /api/v1/apps (no auth) → $STATUS"
          [ "$STATUS" = "401" ]

      - name: Collect logs on failure
        if: failure()
        run: |
          PS=$(docker compose -f docker/docker-compose.yaml ps -a 2>&1 || true)
          # Strip ANSI codes and get ONLY last 20 lines to see the actual error
          TAIL=$(docker compose -f docker/docker-compose.yaml logs --tail=20 backend 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tail -20 || true)
          echo "::error::CONTAINERS: ${PS//$'\n'/ | } --- LAST 20 BACKEND LINES: ${TAIL//$'\n'/ | }"

      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.yaml down -v

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            file: docker/Dockerfile.backend
            context: .
          - image: frontend
            file: docker/Dockerfile.frontend
            context: .
          - image: agent
            file: docker/Dockerfile.agent
            context: .
          - image: gateway
            file: docker/Dockerfile.gateway
            context: .
          - image: azure-gateway
            file: docker/Dockerfile.azure-gateway
            context: .
          - image: init-certs
            file: docker/init-certs/Dockerfile
            context: docker/init-certs
          # NOTE: nginx uses standard nginx:1.27-alpine image (no custom build)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit
        run: cargo audit

  # ---------------------------------------------------------------------------
  # Docker Image Security Scan — trivy vulnerability scanner
  # ---------------------------------------------------------------------------
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            file: docker/Dockerfile.backend
            context: .
          - image: frontend
            file: docker/Dockerfile.frontend
            context: .
          - image: agent
            file: docker/Dockerfile.agent
            context: .
          - image: gateway
            file: docker/Dockerfile.gateway
            context: .
          - image: init-certs
            file: docker/init-certs/Dockerfile
            context: docker/init-certs
          # NOTE: nginx uses standard nginx:1.27-alpine image (no custom build)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }} image for scanning
        run: docker build -t appcontrol/${{ matrix.image }}:scan -f ${{ matrix.file }} ${{ matrix.context }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "appcontrol/${{ matrix.image }}:scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Run Trivy SBOM generation
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "appcontrol/${{ matrix.image }}:scan"
          format: "cyclonedx"
          output: "sbom-${{ matrix.image }}.json"

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.json
          retention-days: 30
