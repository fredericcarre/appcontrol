name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appcontrol_test
          POSTGRES_USER: appcontrol
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Unit tests
        run: cargo test --workspace --exclude appcontrol-e2e-tests --exclude appcontrol-e2e-real
        env:
          DATABASE_URL: postgres://appcontrol:test@localhost:5432/appcontrol_test

  # ---------------------------------------------------------------------------
  # E2E Integration Tests — in-process backend + real PostgreSQL
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [rust-check]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: appcontrol
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run E2E tests
        run: cargo test -p appcontrol-e2e-tests -- --test-threads=1
        env:
          DATABASE_URL: postgres://appcontrol:test@localhost:5432/postgres
          TEST_DATABASE_ADMIN_URL: postgres://appcontrol:test@localhost:5432/postgres
          TEST_REDIS_URL: redis://localhost:6379

  # ---------------------------------------------------------------------------
  # Docker Compose Smoke Test — build images, start full stack, verify endpoints
  # ---------------------------------------------------------------------------
  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [rust-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose -f docker/docker-compose.yaml build

      - name: Start the stack
        run: |
          docker compose -f docker/docker-compose.yaml up -d
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend healthy after $((i * 2))s"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "Backend failed to start within 120s"
              docker compose -f docker/docker-compose.yaml logs backend
              exit 1
            fi
            sleep 2
          done

      - name: Verify health endpoint
        run: |
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/health)
          echo "GET /health → $STATUS"
          [ "$STATUS" = "200" ]

      - name: Verify ready endpoint
        run: |
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/ready)
          echo "GET /ready → $STATUS"
          [ "$STATUS" = "200" ]

      - name: Verify frontend is serving
        run: |
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:8080/)
          echo "GET frontend/ → $STATUS"
          [ "$STATUS" = "200" ]

      - name: Verify API requires auth
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/v1/apps)
          echo "GET /api/v1/apps (no auth) → $STATUS"
          [ "$STATUS" = "401" ]

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yaml logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.yaml down -v

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            file: docker/Dockerfile.backend
          - image: frontend
            file: docker/Dockerfile.frontend
          - image: agent
            file: docker/Dockerfile.agent
          - image: gateway
            file: docker/Dockerfile.gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit
        run: cargo audit
        continue-on-error: true
