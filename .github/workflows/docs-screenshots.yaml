name: Documentation Screenshots

# Generates UI screenshots from a running AppControl stack and commits
# them to docs/screenshots/. The User Guide references these images.
#
# Trigger: on push to main (after merge) or manually via workflow_dispatch.
# This ensures docs always reflect the latest UI state.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  capture-screenshots:
    name: Capture UI Screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose -f docker/docker-compose.yaml build

      - name: Start the full stack
        run: |
          docker compose -f docker/docker-compose.yaml up -d
          echo "Waiting for backend health (via nginx on port 80)..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:80/health > /dev/null 2>&1; then
              echo "Backend healthy after $((i * 2))s"
              break
            fi
            if [ "$i" = "90" ]; then
              echo "Backend failed to start within 180s"
              docker compose -f docker/docker-compose.yaml logs backend
              docker compose -f docker/docker-compose.yaml logs nginx
              exit 1
            fi
            sleep 2
          done

      - name: Verify frontend is serving
        run: |
          # Frontend is served through nginx on port 80 (redirects to HTTPS)
          # Use port 80 to check if frontend assets are being served
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:80/)
          echo "GET frontend/ (via nginx) → $STATUS"
          # 200 = direct success, 301 = redirect to HTTPS (also fine)
          [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ]

      - name: Wait for demo seed pipeline to complete
        run: |
          # The demo pipeline has three short-lived services chained:
          #   demo-seeder  → imports the demo app + creates an agent
          #                  enrollment token
          #   demo-agent   → long-running, enrols itself with that token
          #                  and registers as hostname=demo-host (it is
          #                  auto-bound to all demo components)
          #   demo-starter → waits for the agent to register, then starts
          #                  the application so components transition
          #                  through STARTING → RUNNING
          # We block here until demo-starter has exited successfully —
          # by that point the dashboard, the map and the reports page
          # all hold realistic data ready to be screenshotted.
          for service in demo-seeder demo-starter; do
            SVC_ID=$(docker compose -f docker/docker-compose.yaml ps -aq "$service")
            if [ -z "$SVC_ID" ]; then
              echo "$service service not found"
              docker compose -f docker/docker-compose.yaml ps -a
              exit 1
            fi
            echo "Waiting for $service to exit ..."
            for i in $(seq 1 180); do
              STATUS=$(docker inspect --format='{{.State.Status}}' "$SVC_ID" 2>/dev/null || echo "missing")
              if [ "$STATUS" = "exited" ]; then
                EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' "$SVC_ID")
                if [ "$EXIT_CODE" = "0" ]; then
                  echo "$service completed successfully after $((i * 2))s"
                  docker compose -f docker/docker-compose.yaml logs "$service" | tail -30
                  break
                fi
                echo "$service failed (exit code $EXIT_CODE):"
                docker compose -f docker/docker-compose.yaml logs "$service" | tail -80
                docker compose -f docker/docker-compose.yaml logs demo-agent | tail -40 || true
                exit 1
              fi
              if [ "$i" = "180" ]; then
                echo "$service did not complete within 360s"
                docker compose -f docker/docker-compose.yaml logs "$service" | tail -80
                docker compose -f docker/docker-compose.yaml logs demo-agent | tail -40 || true
                exit 1
              fi
              sleep 2
            done
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots
        working-directory: frontend
        run: npm run screenshots
        continue-on-error: true  # Don't fail the build if some pages have no data

      - name: List captured screenshots
        run: ls -la docs/screenshots/ || echo "No screenshots directory"

      - name: Embed screenshots in documentation
        run: |
          # Replace <!-- SCREENSHOT:name --> markers with actual image references.
          # Two targets, two relative paths:
          #   - docs/USER_GUIDE.md  → screenshots/<name>.png   (sibling directory)
          #   - README.md           → docs/screenshots/<name>.png (from repo root)
          if [ -d docs/screenshots ]; then
            for img in docs/screenshots/*.png; do
              name=$(basename "$img" .png)
              if [ -f docs/USER_GUIDE.md ]; then
                sed -i "s|<!-- SCREENSHOT:${name} -->|![${name}](screenshots/${name}.png)|g" docs/USER_GUIDE.md
              fi
              if [ -f README.md ]; then
                sed -i "s|<!-- SCREENSHOT:${name} -->|![${name}](docs/screenshots/${name}.png)|g" README.md
              fi
            done
          fi

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/ docs/USER_GUIDE.md README.md
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "docs: auto-update UI screenshots [skip ci]"
            git push
          fi

      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: docs/screenshots/
          retention-days: 30

      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.yaml down -v
