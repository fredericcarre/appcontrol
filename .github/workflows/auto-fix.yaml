name: Auto-Fix on Failure

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    name: Claude Code Auto-Fix
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch != 'main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Check attempt count
        id: attempts
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          COUNT=$(git log --oneline --all --grep="auto-fix" -- | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -ge 3 ]; then
            echo "Max auto-fix attempts (3) reached. Skipping."
            exit 1
          fi

      - name: Get failure logs
        id: logs
        run: |
          echo "Fetching CI failure logs..."
          gh run view ${{ github.event.workflow_run.id }} --log-failed > /tmp/ci-failure.log 2>&1 || true
          echo "log_path=/tmp/ci-failure.log" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Code fix
        if: steps.attempts.outputs.count < 3
        run: |
          echo "Claude Code auto-fix would run here."
          echo "Protected files: CLAUDE.md, PROGRESS.md, .github/workflows/"
          echo "Failure log: $(head -50 /tmp/ci-failure.log)"
