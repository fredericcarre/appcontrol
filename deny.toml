# cargo-deny configuration for AppControl
# https://embarkstudios.github.io/cargo-deny/
#
# Schema: cargo-deny ≥ 0.14 (severity-per-field removed). Every
# vulnerability hard-fails the build. Unmaintained / yanked findings
# are surfaced as warnings and ALWAYS appear in the DORA quality
# attestation report — there is no `ignore = [...]` block here and
# we deliberately keep it that way (no per-advisory waivers).

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Scope: scan every dependency (workspace + transitive). Findings
# are surfaced; severity is governed by the advisory database
# itself, not by a local override.
unmaintained = "all"
# Yanked crates are reported as warnings. Tighten to "deny" on a
# specific release branch if a regulator requires it.
yanked = "warn"
# `ignore = […]` is intentionally absent. If a CVE shows up here,
# the fix is to bump the dependency — not to suppress the entry.

[licenses]
confidence-threshold = 0.8
# Workspace crates declared `publish = false` are not redistributed
# upstream and therefore do not need to carry a per-crate license
# field. cargo-deny would otherwise flag them as `unlicensed`.
# Third-party deps remain fully checked against the allow-list
# below.
private = { ignore = true }
# Explicit allow-list. Licenses NOT listed here cause cargo-deny
# to fail, which is the desired behaviour for a proprietary
# distribution: every new dependency requires a conscious license
# decision.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    # Used by webpki-roots — the certificate root data is licensed
    # under the Community Data License Agreement Permissive 2.0,
    # an OSI-recognised permissive data license.
    "CDLA-Permissive-2.0",
]

# `ring` declares a custom license string in its Cargo.toml that
# cargo-deny cannot parse; clarify it manually so the SHA matches
# the LICENSE file in the crate.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
