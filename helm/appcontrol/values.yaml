# Default values for AppControl

global:
  imageRegistry: ""
  imagePullSecrets: []

backend:
  replicaCount: 2
  image:
    repository: appcontrol/backend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  env:
    RUST_LOG: "info"
    CORS_ORIGINS: ""
  database:
    # For production: use an external managed database (RDS, CloudSQL, Azure Database).
    # Set url to the connection string or use existingSecret.
    url: ""
    existingSecret: ""
    secretKey: "database-url"
  # redis: DEPRECATED — Redis is no longer used (removed in Phase 10).
  jwt:
    secret: ""
    existingSecret: ""
    secretKey: "jwt-secret"

frontend:
  replicaCount: 2
  image:
    repository: appcontrol/frontend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi

gateway:
  replicaCount: 2
  image:
    repository: appcontrol/gateway
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 4443
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# ---------------------------------------------------------------
# PostgreSQL — in-cluster StatefulSet with persistent storage.
# For production: set enabled=false and configure backend.database.url
# to point to a managed database (RDS, CloudSQL, Azure DB).
# ---------------------------------------------------------------
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    database: appcontrol
    username: appcontrol
    password: ""
    existingSecret: ""
    secretKey: "postgresql-password"
  primary:
    persistence:
      size: 20Gi
      storageClass: ""
    initdbScriptsConfigMap: ""
    extraEnv: []
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

# ---------------------------------------------------------------
# Redis — DEPRECATED (no longer used since Phase 10).
# The backend now uses PostgreSQL for token revocation and rate
# limiting. This section is retained for backward compatibility
# but should be set to enabled: false.
# ---------------------------------------------------------------
redis:
  enabled: false
  replicaCount: 1
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  auth:
    enabled: false
    password: ""
    existingSecret: ""
    secretKey: "redis-password"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  maxmemory: "256mb"
  sentinel:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------
# Pod Disruption Budgets — prevent voluntary disruptions from
# evicting all pods simultaneously (node drain, rolling updates).
# ---------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  backend:
    minAvailable: 1
  gateway:
    minAvailable: 1
  frontend:
    minAvailable: 1

# ---------------------------------------------------------------
# Nginx reverse proxy with TLS termination.
# When enabled, nginx handles HTTPS and proxies to backend/frontend.
# ---------------------------------------------------------------
nginx:
  enabled: false
  replicaCount: 2
  image:
    repository: appcontrol/nginx
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    httpPort: 80
    httpsPort: 443
    mtlsPort: 8443
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # TLS certificate configuration
  tls:
    # Use existing secret for TLS certs
    existingSecret: ""
    # Or use cert-manager
    certManager:
      enabled: false
      issuer: ""
      issuerKind: ClusterIssuer
    # Or generate self-signed (for dev/test)
    selfSigned: true
    # Server certificate common name
    commonName: "appcontrol.local"
    # Additional DNS SANs
    dnsNames: []
    # Additional IP SANs
    ipAddresses: []

# ---------------------------------------------------------------
# Certificate initialization Job.
# Runs once to generate/fetch TLS certificates.
# ---------------------------------------------------------------
initCerts:
  enabled: false
  image:
    repository: appcontrol/init-certs
    tag: ""
    pullPolicy: IfNotPresent
  # Additional DNS SANs for the server certificate
  extraSans: ""
  # Certificate validity in days
  validityDays: 365

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: appcontrol.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

networkPolicy:
  enabled: true

openshift:
  enabled: false
  route:
    enabled: false
    host: ""
