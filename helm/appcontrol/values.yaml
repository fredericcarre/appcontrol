# Default values for AppControl

global:
  imageRegistry: ""
  imagePullSecrets: []

backend:
  replicaCount: 2
  image:
    repository: appcontrol/backend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  env:
    RUST_LOG: "info"
  database:
    url: ""
    existingSecret: ""
    secretKey: "database-url"
  redis:
    url: ""
  jwt:
    secret: ""
    existingSecret: ""
    secretKey: "jwt-secret"

frontend:
  replicaCount: 2
  image:
    repository: appcontrol/frontend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi

gateway:
  replicaCount: 2
  image:
    repository: appcontrol/gateway
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 4443
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 256Mi

postgresql:
  enabled: true
  auth:
    database: appcontrol
    username: appcontrol
    existingSecret: ""
  primary:
    persistence:
      size: 10Gi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: appcontrol.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

openshift:
  enabled: false
  route:
    enabled: false
    host: ""
