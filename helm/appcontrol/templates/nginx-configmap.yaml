{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "appcontrol.fullname" . }}-nginx-config
  labels:
    {{- include "appcontrol.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
data:
  nginx.conf: |
    # AppControl nginx configuration with TLS termination
    load_module /usr/lib/nginx/modules/ngx_stream_module.so;

    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    stream {
        upstream gateway_backend {
            server {{ include "appcontrol.fullname" . }}-gateway:{{ .Values.gateway.service.port }};
        }

        server {
            listen 8443;
            proxy_pass gateway_backend;
            proxy_connect_timeout 10s;
            proxy_timeout 3600s;
        }
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
        gzip_min_length 256;

        server_tokens off;

        server {
            listen 80;
            server_name _;

            location /health {
                proxy_pass http://{{ include "appcontrol.fullname" . }}-backend:{{ .Values.backend.service.port }}/health;
                proxy_set_header Host $host;
            }

            location / {
                return 301 https://$host$request_uri;
            }
        }

        server {
            listen 443 ssl;
            http2 on;
            server_name _;

            ssl_certificate /certs/tls.crt;
            ssl_certificate_key /certs/tls.key;
            ssl_trusted_certificate /certs/ca.crt;

            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
            ssl_prefer_server_ciphers off;

            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 1d;
            ssl_session_tickets off;

            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

            root /usr/share/nginx/html;
            index index.html;

            location /api/ {
                proxy_pass http://{{ include "appcontrol.fullname" . }}-backend:{{ .Values.backend.service.port }}/api/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 10s;
                proxy_send_timeout 120s;
                proxy_read_timeout 120s;
                client_max_body_size 50m;
            }

            location /ws {
                proxy_pass http://{{ include "appcontrol.fullname" . }}-backend:{{ .Values.backend.service.port }}/ws;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 86400s;
                proxy_send_timeout 86400s;
            }

            location /health {
                proxy_pass http://{{ include "appcontrol.fullname" . }}-backend:{{ .Values.backend.service.port }}/health;
                proxy_set_header Host $host;
            }

            location /metrics {
                proxy_pass http://{{ include "appcontrol.fullname" . }}-backend:{{ .Values.backend.service.port }}/metrics;
                proxy_set_header Host $host;
            }

            location / {
                try_files $uri $uri/ /index.html;
            }

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                try_files $uri =404;
            }

            location ~ /\. {
                deny all;
                return 404;
            }
        }
    }
{{- end }}
