apiVersion: v1
kind: Service
metadata:
  name: {{ include "appcontrol.fullname" . }}-gateway
  labels:
    {{- include "appcontrol.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: 4443
      protocol: TCP
      name: wss
  selector:
    {{- include "appcontrol.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
