apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appcontrol.fullname" . }}-gateway
  labels:
    {{- include "appcontrol.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "appcontrol.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "appcontrol.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "appcontrol.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: gateway
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: gateway
          image: "{{ .Values.global.imageRegistry }}{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - containerPort: 4443
              protocol: TCP
          env:
            - name: GATEWAY_NAME
              value: {{ .Values.gateway.env.name | default (printf "%s-gateway" (include "appcontrol.fullname" .)) | quote }}
            - name: LISTEN_ADDR
              value: "0.0.0.0"
            - name: LISTEN_PORT
              value: "4443"
            - name: BACKEND_URL
              value: "ws://{{ include "appcontrol.fullname" . }}-backend:{{ .Values.backend.service.port }}/ws/gateway"
            - name: RUST_LOG
              value: {{ .Values.gateway.env.RUST_LOG | default "info" | quote }}
            - name: TLS_ENABLED
              value: {{ .Values.gateway.tls.enabled | default false | quote }}
            {{- if .Values.gateway.tls.enabled }}
            - name: TLS_CERT_FILE
              value: "/certs/gateway.crt"
            - name: TLS_KEY_FILE
              value: "/certs/gateway.key"
            - name: TLS_CA_FILE
              value: "/certs/pki-ca.crt"
            {{- end }}
          {{- if .Values.gateway.tls.enabled }}
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          {{- end }}
          livenessProbe:
            tcpSocket:
              port: 4443
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 4443
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      {{- if .Values.gateway.tls.enabled }}
      volumes:
        - name: certs
          secret:
            secretName: {{ .Values.gateway.tls.existingSecret | default (printf "%s-gateway-certs" (include "appcontrol.fullname" .)) }}
      {{- end }}
