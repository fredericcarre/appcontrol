apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appcontrol.fullname" . }}-backend
  labels:
    {{- include "appcontrol.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "appcontrol.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "appcontrol.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "appcontrol.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: backend
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: "{{ .Values.global.imageRegistry }}{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: RUST_LOG
              value: {{ .Values.backend.env.RUST_LOG | quote }}
            - name: DATABASE_URL
              {{- if .Values.backend.database.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.database.existingSecret }}
                  key: {{ .Values.backend.database.secretKey }}
              {{- else }}
              value: {{ .Values.backend.database.url | quote }}
              {{- end }}
            - name: REDIS_URL
              {{- if .Values.backend.redis.url }}
              value: {{ .Values.backend.redis.url | quote }}
              {{- else if .Values.redis.enabled }}
              value: "redis://{{ include "appcontrol.fullname" . }}-redis:6379"
              {{- else }}
              value: ""
              {{- end }}
            {{- if .Values.backend.env.CORS_ORIGINS }}
            - name: CORS_ORIGINS
              value: {{ .Values.backend.env.CORS_ORIGINS | quote }}
            {{- end }}
            - name: JWT_SECRET
              {{- if .Values.backend.jwt.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.jwt.existingSecret }}
                  key: {{ .Values.backend.jwt.secretKey }}
              {{- else }}
              value: {{ .Values.backend.jwt.secret | quote }}
              {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
