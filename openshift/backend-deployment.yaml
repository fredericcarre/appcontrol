apiVersion: apps/v1
kind: Deployment
metadata:
  name: appcontrol-backend
  labels:
    app.kubernetes.io/name: appcontrol
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: appcontrol
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: appcontrol
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/fredericcarre/appcontrol-backend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: appcontrol-postgres
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appcontrol-backend
                  key: JWT_SECRET
            - name: PORT
              value: "3000"
            - name: RUST_LOG
              value: "info,appcontrol_backend=debug"
            - name: SEED_ENABLED
              value: "true"
            - name: SEED_ADMIN_EMAIL
              value: "${SEED_ADMIN_EMAIL}"
            - name: SEED_ADMIN_DISPLAY_NAME
              value: "${SEED_ADMIN_DISPLAY_NAME}"
            - name: SEED_ORG_NAME
              value: "${SEED_ORG_NAME}"
            - name: SEED_ORG_SLUG
              value: "${SEED_ORG_SLUG}"
            - name: CORS_ORIGINS
              value: "${CORS_ORIGINS}"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
