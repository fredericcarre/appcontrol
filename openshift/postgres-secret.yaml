apiVersion: v1
kind: Secret
metadata:
  name: appcontrol-postgres
  labels:
    app.kubernetes.io/name: appcontrol
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_DB: "${POSTGRES_DB}"
  POSTGRES_USER: "${POSTGRES_USER}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@appcontrol-postgres:5432/${POSTGRES_DB}"
