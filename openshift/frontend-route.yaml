apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: appcontrol
  labels:
    app.kubernetes.io/name: appcontrol
    app.kubernetes.io/component: frontend
  annotations:
    haproxy.router.openshift.io/timeout: 86400s
spec:
  host: "${ROUTE_HOST}"
  to:
    kind: Service
    name: appcontrol-frontend
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
