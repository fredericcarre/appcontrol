# Cargo audit configuration
# See: https://docs.rs/cargo-audit

[advisories]
ignore = [
    # rsa 0.9.10 — Marvin Attack timing sidechannel (no fix available upstream)
    # Pulled in by sqlx-mysql via sqlx-macros-core. We never use MySQL —
    # only PostgreSQL and SQLite. The RSA code path is unreachable.
    "RUSTSEC-2023-0071",

    # quinn-proto — QUIC protocol vulnerability
    # Pulled in by reqwest via HTTP/3 support. We only use HTTP/1.1 + HTTP/2.
    "RUSTSEC-2026-0037",
]
