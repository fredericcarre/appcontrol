# Cargo audit configuration
# See: https://docs.rs/cargo-audit

[advisories]
ignore = [
    # rsa 0.9.10 — Marvin Attack timing sidechannel (CVSS 5.9 medium)
    # No fix available upstream. Pulled in transitively by sqlx-mysql 0.8.6.
    # We only use PostgreSQL and SQLite, never MySQL, so this RSA padding
    # oracle attack surface is not reachable in our codebase.
    "RUSTSEC-2023-0071",
]
