# Docker Compose for running AppControl from the latest GitHub release.
# No local build required — pulls pre-built images from GHCR.
#
# Usage:
#   docker compose -f docker/docker-compose.release.yaml up -d
#   open https://localhost
#   Login: admin@localhost / admin (change SEED_ADMIN_PASSWORD for production!)
#
#   # Pin a specific version:
#   APPCONTROL_VERSION=0.2.0 docker compose -f docker/docker-compose.release.yaml up -d
#
#   # Tear down:
#   docker compose -f docker/docker-compose.release.yaml down -v

version: "3.8"

# Override the version with: APPCONTROL_VERSION=x.y.z docker compose ... up -d
# Defaults to "latest" if not set.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appcontrol
      POSTGRES_USER: appcontrol
      POSTGRES_PASSWORD: appcontrol_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appcontrol"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/fredericcarre/appcontrol-backend:${APPCONTROL_VERSION:-latest}
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgres://appcontrol:appcontrol_dev@postgres:5432/appcontrol
      PORT: "3000"
      JWT_SECRET: dev-secret-change-in-production
      RUST_LOG: info,appcontrol_backend=debug
      CERT_EXPORT_PATH: /certs
      # ── Initial admin user (created on first start) ──
      SEED_ENABLED: "true"
      SEED_ADMIN_EMAIL: admin@localhost
      SEED_ADMIN_PASSWORD: admin
      SEED_ADMIN_DISPLAY_NAME: Admin
      SEED_ORG_NAME: Default Organization
      SEED_ORG_SLUG: default
      # ── SSO (optional) ──
      # OIDC_DISCOVERY_URL: https://login.example.com/.well-known/openid-configuration
      # OIDC_CLIENT_ID: appcontrol
      # OIDC_CLIENT_SECRET: your-secret
      # SAML_IDP_SSO_URL: https://idp.example.com/sso
      # ── Public URLs for enrollment commands (optional) ──
      # PUBLIC_GATEWAY_URL: wss://gateway.company.com:8443
      # PUBLIC_BACKEND_URL: wss://backend.company.com/ws/gateway
    volumes:
      - certs:/certs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  frontend:
    image: ghcr.io/fredericcarre/appcontrol-frontend:${APPCONTROL_VERSION:-latest}
    expose:
      - "8080"
    depends_on:
      - backend

  gateway:
    image: ghcr.io/fredericcarre/appcontrol-gateway:${APPCONTROL_VERSION:-latest}
    expose:
      - "4443"
    environment:
      GATEWAY_NAME: gateway-default
      GATEWAY_ZONE: default
      LISTEN_ADDR: "0.0.0.0"
      LISTEN_PORT: "4443"
      BACKEND_URL: ws://backend:3000/ws/gateway
      RUST_LOG: info,appcontrol_gateway=debug
    depends_on:
      - backend

  # Certificate initialization container
  init-certs:
    image: ghcr.io/fredericcarre/appcontrol-init-certs:${APPCONTROL_VERSION:-latest}
    environment:
      CERT_DIR: /certs
      BACKEND_URL: http://backend:3000
      SERVER_CN: localhost
      EXTRA_SANS: appcontrol,nginx
    volumes:
      - certs:/certs
    depends_on:
      backend:
        condition: service_healthy

  # Nginx reverse proxy with TLS termination
  nginx:
    image: ghcr.io/fredericcarre/appcontrol-nginx:${APPCONTROL_VERSION:-latest}
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - certs:/certs:ro
    depends_on:
      init-certs:
        condition: service_completed_successfully
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  certs:
