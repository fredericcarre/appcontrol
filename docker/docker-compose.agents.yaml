# Multi-site agents for testing DR/failover
# Usage: docker compose -f docker-compose.yaml -f docker-compose.agents.yaml up -d

services:
  # Paris site (primary)
  agent-paris:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    hostname: agent-paris  # <-- This sets the real hostname!
    command: ["appcontrol-agent", "--config", "/var/lib/appcontrol/agent.yaml"]
    environment:
      RUST_LOG: info,appcontrol_agent=debug
    volumes:
      - agent-paris-config:/var/lib/appcontrol
    depends_on:
      - gateway-paris

  # Lyon site (DR)
  agent-lyon:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    hostname: agent-lyon  # <-- This sets the real hostname!
    command: ["appcontrol-agent", "--config", "/var/lib/appcontrol/agent.yaml"]
    environment:
      RUST_LOG: info,appcontrol_agent=debug
    volumes:
      - agent-lyon-config:/var/lib/appcontrol
    depends_on:
      - gateway-lyon

  # Paris gateway
  gateway-paris:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    hostname: gateway-paris
    ports:
      - "4443:4443"
    environment:
      GATEWAY_ID: "gateway-paris"
      GATEWAY_NAME: "gateway-paris"
      GATEWAY_SITE_ID: "11111111-1111-1111-1111-111111111111"
      LISTEN_ADDR: "0.0.0.0"
      LISTEN_PORT: "4443"
      BACKEND_URL: ws://backend:3000/ws/gateway
      RUST_LOG: info,appcontrol_gateway=debug
      TLS_ENABLED: "true"
      TLS_CERT_FILE: /certs/gateway.crt
      TLS_KEY_FILE: /certs/gateway.key
      TLS_CA_FILE: /etc/appcontrol/combined-ca.crt
    volumes:
      - certs:/certs:ro
      - ./certs/combined-ca.crt:/etc/appcontrol/combined-ca.crt:ro
    depends_on:
      init-certs:
        condition: service_completed_successfully

  # Lyon gateway
  gateway-lyon:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    hostname: gateway-lyon
    ports:
      - "4444:4443"
    environment:
      GATEWAY_ID: "gateway-lyon"
      GATEWAY_NAME: "gateway-lyon"
      GATEWAY_SITE_ID: "22222222-2222-2222-2222-222222222222"
      LISTEN_ADDR: "0.0.0.0"
      LISTEN_PORT: "4443"
      BACKEND_URL: ws://backend:3000/ws/gateway
      RUST_LOG: info,appcontrol_gateway=debug
      TLS_ENABLED: "true"
      TLS_CERT_FILE: /certs/gateway.crt
      TLS_KEY_FILE: /certs/gateway.key
      TLS_CA_FILE: /etc/appcontrol/combined-ca.crt
    volumes:
      - certs:/certs:ro
      - ./certs/combined-ca.crt:/etc/appcontrol/combined-ca.crt:ro
    depends_on:
      init-certs:
        condition: service_completed_successfully

volumes:
  agent-paris-config:
    external: true
  agent-lyon-config:
    external: true
