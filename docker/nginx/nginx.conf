# AppControl nginx configuration with TLS termination
# Handles HTTPS on :443 and mTLS passthrough on :8443

# Note: stream module is loaded via nginx-mod-stream package in alpine
# Do not use load_module here as it's already loaded

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

# Stream passthrough for gateway mTLS (port 8443 -> gateway:4443)
# This allows agents to connect with mTLS directly to the gateway
stream {
    upstream gateway_backend {
        server gateway:4443;
    }

    server {
        listen 8443;
        proxy_pass gateway_backend;
        proxy_connect_timeout 10s;
        proxy_timeout 3600s;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # Hide server version
    server_tokens off;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;

        # Health check endpoint (unencrypted for load balancers)
        location /health {
            proxy_pass http://backend:3000/health;
            proxy_set_header Host $host;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main HTTPS server
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # TLS Configuration
        ssl_certificate /certs/server.crt;
        ssl_certificate_key /certs/server.key;
        ssl_trusted_certificate /certs/ca.crt;

        # TLS 1.2+ only, secure ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # SSL session cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling (disabled for self-signed certs)
        # ssl_stapling on;
        # ssl_stapling_verify on;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'none'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Root for SPA
        root /usr/share/nginx/html;
        index index.html;

        # API proxy to backend
        location /api/ {
            proxy_pass http://backend:3000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Request body size (for file uploads, map imports)
            client_max_body_size 50m;
        }

        # WebSocket proxy for frontend real-time updates
        location /ws {
            proxy_pass http://backend:3000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeout (24 hours for long-lived connections)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Health check (unencrypted passthrough)
        location /health {
            proxy_pass http://backend:3000/health;
            proxy_set_header Host $host;
        }

        # Metrics endpoint (internal only)
        location /metrics {
            proxy_pass http://backend:3000/metrics;
            proxy_set_header Host $host;
            # Restrict to internal networks in production
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # allow 192.168.0.0/16;
            # deny all;
        }

        # SPA fallback - serve index.html for all unmatched routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
