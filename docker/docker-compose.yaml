version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appcontrol
      POSTGRES_USER: appcontrol
      POSTGRES_PASSWORD: appcontrol_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appcontrol"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://appcontrol:appcontrol_dev@postgres:5432/appcontrol
      PORT: "3000"
      JWT_SECRET: dev-secret-change-in-production
      RUST_LOG: info,appcontrol_backend=debug
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "4443:4443"
    environment:
      LISTEN_ADDR: "0.0.0.0"
      LISTEN_PORT: "4443"
      BACKEND_URL: ws://backend:3000/ws
      RUST_LOG: info,appcontrol_gateway=debug
    depends_on:
      - backend

volumes:
  pgdata:
