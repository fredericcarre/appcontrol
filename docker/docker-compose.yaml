services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appcontrol
      POSTGRES_USER: appcontrol
      POSTGRES_PASSWORD: appcontrol_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appcontrol"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgres://appcontrol:appcontrol_dev@postgres:5432/appcontrol
      PORT: "3000"
      JWT_SECRET: dev-secret-change-in-production
      RUST_LOG: info,appcontrol_backend=debug
      LOCAL_AUTH_ENABLED: "true"
      # Certificate export path for nginx TLS
      CERT_EXPORT_PATH: /certs
      # ── Seed configuration ──
      # On first start (empty DB), creates this org + admin user.
      SEED_ENABLED: "true"
      SEED_ADMIN_EMAIL: admin@localhost
      SEED_ADMIN_DISPLAY_NAME: Admin
      SEED_ORG_NAME: Default Organization
      SEED_ORG_SLUG: default
      # ── Public URLs for enrollment commands ──
      # If not set, UI uses window.location (which works for local dev)
      # PUBLIC_GATEWAY_URL: wss://gateway.company.com:4443
      # PUBLIC_BACKEND_URL: wss://backend.company.com/ws/gateway
    volumes:
      - certs:/certs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    expose:
      - "8080"
    depends_on:
      - backend

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "4443:4443"  # Gateway exposed directly for agent connections
    environment:
      # Gateway identity
      GATEWAY_NAME: "gateway-default"
      # GATEWAY_SITE_ID: Leave empty for "Unassigned" - assign to a site via UI
      # Or set to a UUID to pre-assign: GATEWAY_SITE_ID: "11111111-1111-1111-1111-111111111111"
      # GATEWAY_ZONE is deprecated, use GATEWAY_SITE_ID instead
      # Network
      LISTEN_ADDR: "0.0.0.0"
      LISTEN_PORT: "4443"
      # SECURITY: ws:// is acceptable here because gateway and backend share the
      # same Docker network (no external exposure). In production, use wss:// with
      # BACKEND_TLS_CA_FILE pointing to your internal CA certificate.
      BACKEND_URL: ws://backend:3000/ws/gateway
      RUST_LOG: info,appcontrol_gateway=debug
      # TLS certificates from PKI (mounted from shared volume)
      TLS_ENABLED: "true"
      TLS_CERT_FILE: /certs/gateway.crt
      TLS_KEY_FILE: /certs/gateway.key
      TLS_CA_FILE: /etc/appcontrol/combined-ca.crt
    volumes:
      - certs:/certs:ro
      - ./certs/combined-ca.crt:/etc/appcontrol/combined-ca.crt:ro
    depends_on:
      init-certs:
        condition: service_completed_successfully

  # Certificate initialization container
  # Runs once at startup to generate/fetch TLS certificates
  init-certs:
    build:
      context: ./init-certs
    environment:
      CERT_DIR: /certs
      BACKEND_URL: http://backend:3000
      SERVER_CN: localhost
      # Extra SANs (comma-separated DNS names or IPs)
      EXTRA_SANS: appcontrol,nginx
    volumes:
      - certs:/certs
    depends_on:
      backend:
        condition: service_healthy

  # Demo data seeder (runs once; idempotent)
  # Imports examples/banking-core-system.json so the dashboard,
  # documentation screenshots and screen recordings have a real
  # application to display. Also creates an enrollment token for
  # the demo-agent service below.
  demo-seeder:
    image: alpine:3.19
    command: >
      sh -c "apk add --no-cache --quiet curl jq bash >/dev/null &&
             bash /workspace/scripts/seed-demo.sh"
    environment:
      BACKEND_URL: http://backend:3000
      SEED_ADMIN_EMAIL: admin@localhost
      EXAMPLE_FILE: /workspace/examples/banking-core-system.json
      DEMO_AGENT_HOSTNAME: demo-host
      TOKEN_OUT: /workspace/state/enrollment-token
    volumes:
      - ../scripts:/workspace/scripts:ro
      - ../examples:/workspace/examples:ro
      - demo-state:/workspace/state
    depends_on:
      backend:
        condition: service_healthy
    restart: "no"

  # Demo starter and demo-agent and demo-incident-injector are
  # intentionally absent from this compose. They were briefly enabled
  # (commits 2a43201 / 32fe04c) but the agent ↔ gateway mTLS path is
  # not currently aligned in this environment — the gateway's
  # combined-ca.crt does not include the dynamic per-org PKI CA that
  # signs the agent's enrollment cert, so the gateway rejects the
  # agent with a DecryptError TLS alert. Re-enabling them is a
  # follow-up chantier (either fix the cert export to /certs, or
  # rebuild combined-ca.crt at runtime to include the backend's CA).
  #
  # In the meantime, demo-seeder still imports the Core Banking System
  # so the dashboard, map and audit views all have realistic data.
  # Components stay in UNKNOWN state (no agent to run check_cmd) but
  # their structure, dependencies and metadata are visible — already a
  # large step up from the empty pipeline.

  # Nginx reverse proxy with TLS termination (web UI + API only)
  # Note: Agents connect directly to gateway:4443, NOT through nginx
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"     # HTTP (redirects to HTTPS)
      - "443:443"   # HTTPS (TLS termination for web UI)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/certs:ro
    depends_on:
      init-certs:
        condition: service_completed_successfully
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  certs:
  demo-state:
