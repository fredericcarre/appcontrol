site_name: AppControl
site_description: >-
  Operational platform for IT resilience. Map applications as dependency
  graphs, monitor health in real time, orchestrate sequenced operations,
  and maintain DORA-compliant audit trails.
site_url: https://fredericcarre.github.io/appcontrol/
site_author: AppControl

repo_name: fredericcarre/appcontrol
repo_url: https://github.com/fredericcarre/appcontrol
edit_uri: edit/main/docs/

copyright: >-
  Copyright &copy; AppControl &mdash;
  <a href="https://github.com/fredericcarre/appcontrol">Source on GitHub</a>

# Roots and outputs
docs_dir: docs
site_dir: site

# Treat broken internal links / missing pages as warnings, not errors, so a
# stale cross-reference does not block a Pages deploy. CI uses --strict only
# on release builds where we want zero broken links shipped to users.
strict: false

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fredericcarre/appcontrol
  generator: false

markdown_extensions:
  # Python-markdown built-ins
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  # PyMdown
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: en
  # Show "last updated" date on every page using git history.
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true

# Hide internal / dev-only pages from the navigation tree but still build
# them so direct links keep working.
#   - DYNAMIC_CONFIG_PLAN.md: internal implementation plan, not user-facing
#   - quality-reports/*: per-release attestation reports auto-generated by
#     the release-quality-report workflow. Browsable by direct URL; not
#     surfaced in the nav (they would dominate it).
not_in_nav: |
  /DYNAMIC_CONFIG_PLAN.md
  /quality-reports/*.md

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: QUICKSTART.md
      - Demo scenarios: DEMO_SCENARIOS.md
      - Where it fits (positioning): POSITIONING.md
  - User Guide:
      - Overview: USER_GUIDE.md
      - Permissions: PERMISSIONS.md
      - Runbooks: RUNBOOKS.md
  - Operations:
      - Integration cookbook: INTEGRATION_COOKBOOK.md
      - Metrics: METRICS.md
      - Migration from scripts: MIGRATION_FROM_SCRIPTS.md
  - Deployment:
      - Production deployment: PRODUCTION_DEPLOYMENT.md
      - Agent installation: AGENT_INSTALLATION.md
      - Azure gateway: AZURE_GATEWAY.md
      - OpenShift: OPENSHIFT.md
      - Windows deployment: WINDOWS_DEPLOYMENT.md
  - Configuration:
      - Configuration reference: CONFIGURATION.md
      - SQLite implementation: SQLITE_IMPLEMENTATION.md
  - Architecture:
      - Architecture overview: architecture.md
      - Security architecture: SECURITY_ARCHITECTURE.md
  - Release:
      - Changelog: CHANGELOG.md
      - Release process: RELEASE.md
