site_name: AppControl
site_description: >-
  Operational platform for IT resilience. Map applications as dependency
  graphs, monitor health in real time, orchestrate sequenced operations,
  and maintain DORA-compliant audit trails.
site_url: https://docs.appcontrol.io/
site_author: AppControl

# The repo link in the top bar points to the corp release repo (binaries,
# release notes). The `edit_uri` below redirects "Edit this page" pencils to
# the dev mirror where contributions actually happen.
repo_name: xcomponent/appcontrol-release
repo_url: https://github.com/xcomponent/appcontrol-release
edit_uri: https://github.com/fredericcarre/appcontrol/edit/main/docs/

copyright: >-
  Copyright &copy; AppControl &mdash;
  <a href="https://github.com/fredericcarre/appcontrol">Source on GitHub</a>

# Roots and outputs
docs_dir: docs
site_dir: site

# Draft strategic deliverables (sales / direction-targeted decks) — kept in
# the repo for collaboration but not published on docs.appcontrol.io until
# they exit draft status. Re-add to `nav` (above) when promoted to v1.0.
exclude_docs: |
  strategy.html
  methodology.html
  vision.html
  pricing.html
  implementation-status.md
  README-strategy.md
  STRATEGY_SLIDES.md
  strategy.md
  invivoo-reference.docx
  build-docx.sh
  build-reference-docx.py
  invivoo-logo.svg

# Treat broken internal links / missing pages as warnings, not errors, so a
# stale cross-reference does not block a Pages deploy. CI uses --strict only
# on release builds where we want zero broken links shipped to users.
strict: false

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fredericcarre/appcontrol
  generator: false

markdown_extensions:
  # Python-markdown built-ins
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  # PyMdown
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: en
  # Show "last updated" date on every page using git history.
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true

# Hide internal / dev-only pages from the navigation tree but still build
# them so direct links keep working.
#   - DYNAMIC_CONFIG_PLAN.md: internal implementation plan, not user-facing
#   - quality-reports/*: per-release attestation reports auto-generated by
#     the release-quality-report workflow. Browsable by direct URL; not
#     surfaced in the nav (they would dominate it).
not_in_nav: |
  /DYNAMIC_CONFIG_PLAN.md
  /quality-reports/*.md

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: QUICKSTART.md
      - Hands-on guide: HANDS_ON_GUIDE.md
      - FAQ: FAQ.md
      - Demo scenarios: DEMO_SCENARIOS.md
      - Where it fits (positioning): POSITIONING.md
      - Glossary: GLOSSARY.md
  - User Guide:
      - Overview: USER_GUIDE.md
      - Methodology in 9 screens: METHODOLOGY_WALKTHROUGH.md
      - Example maps & ingestion patterns: EXAMPLE_MAPS.md
      - Permissions: PERMISSIONS.md
      - Runbooks: RUNBOOKS.md
      - Troubleshooting: TROUBLESHOOTING.md
  - Operations:
      - Integration cookbook: INTEGRATION_COOKBOOK.md
      - Observability (Prometheus/Grafana): OBSERVABILITY.md
      - Check metrics: METRICS.md
      - Migration from scripts: MIGRATION_FROM_SCRIPTS.md
      - Backup & restore: BACKUP_RESTORE.md
      - Upgrade procedures: UPGRADE.md
      - Disaster recovery: DISASTER_RECOVERY.md
  - Deployment:
      - Production deployment: PRODUCTION_DEPLOYMENT.md
      - High availability: HIGH_AVAILABILITY.md
      - Agent installation: AGENT_INSTALLATION.md
      - Azure gateway: AZURE_GATEWAY.md
      - OpenShift: OPENSHIFT.md
      - Windows deployment: WINDOWS_DEPLOYMENT.md
      - Hardening checklist: HARDENING.md
      - Capacity planning: CAPACITY_PLANNING.md
      - Limits & quotas: LIMITS.md
  - Configuration:
      - Configuration overview: CONFIGURATION.md
      - SQLite implementation: SQLITE_IMPLEMENTATION.md
  - Reference:
      - CLI (appctl): reference/cli.md
      - REST API: reference/api.md
      - Configuration env vars: reference/configuration.md
      - Errors & exit codes: reference/errors.md
      - FSM states: reference/fsm.md
      - Database schema: reference/database.md
      - Prometheus metrics: reference/metrics.md
      - Enums: reference/enums.md
      - MCP tools: reference/mcp.md
  - Architecture:
      - Architecture overview: architecture.md
      - Security architecture: SECURITY_ARCHITECTURE.md
  - Compliance:
      - DORA & NIS2 mapping: COMPLIANCE_DORA_NIS2.md
  - Release:
      - Changelog: CHANGELOG.md
      - Release process: RELEASE.md
